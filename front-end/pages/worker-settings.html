<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Settings — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    /* ── Layout ──────────────────────────────────────────── */
    .ws-layout  { display:flex; gap:24px; align-items:flex-start; }
    .ws-sidenav { width:220px; flex-shrink:0; position:sticky; top:80px; }
    .ws-main    { flex:1; min-width:0; }
    @media(max-width:800px){
      .ws-layout  { flex-direction:column; }
      .ws-sidenav { width:100%; position:static; }
    }

    /* ── Side nav ────────────────────────────────────────── */
    .ws-nav-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:12px;
      box-shadow:0 10px 40px 5px rgba(194,194,194,.12);
    }
    .ws-nav-btn {
      display:flex; align-items:center; gap:10px;
      width:100%; padding:11px 14px; border-radius:10px;
      border:none; cursor:pointer; font-size:13px; font-weight:500;
      background:transparent; color:var(--muted-foreground);
      transition:background .15s, color .15s;
      margin-bottom:2px; text-align:left;
    }
    .ws-nav-btn:last-child { margin-bottom:0; }
    .ws-nav-btn:hover  { background:rgba(0,0,0,.04); color:var(--foreground); }
    .ws-nav-btn.active { background:var(--foreground); color:var(--background); }

    /* ── Content card ────────────────────────────────────── */
    .ws-content {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:32px;
      box-shadow:0 10px 40px 5px rgba(194,194,194,.12);
    }

    /* ── Tab panels ──────────────────────────────────────── */
    .ws-tab        { display:none; }
    .ws-tab.active { display:block; }

    /* ── Typography helpers ──────────────────────────────── */
    .ws-section-title  { font-size:19px; font-weight:500; margin-bottom:4px; }
    .ws-section-sub    { font-size:13px; color:var(--muted-foreground); margin-bottom:24px; }
    .ws-section-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; }
    .ws-divider        { height:1px; background:var(--border); margin:24px 0; }

    /* ── Form ────────────────────────────────────────────── */
    .ws-label { display:block; font-size:13px; font-weight:500; margin-bottom:8px; }
    .ws-input, .ws-select, .ws-textarea {
      width:100%; padding:0 14px; height:44px; border-radius:8px;
      border:1px solid var(--border); background:rgba(0,0,0,.025);
      font-size:13px; font-family:inherit; color:var(--foreground);
      outline:none; transition:border-color .15s, box-shadow .15s;
      box-sizing:border-box;
    }
    .ws-input:focus, .ws-select:focus, .ws-textarea:focus {
      border-color:var(--foreground);
      box-shadow:0 0 0 3px rgba(0,0,0,.06);
    }
    .ws-textarea { height:auto; padding:12px 14px; resize:none; }
    .ws-input-wrap { position:relative; }
    .ws-input-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted-foreground); pointer-events:none; }
    .ws-input-wrap .ws-input { padding-left:38px; }
    .ws-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:600px){ .ws-grid-2 { grid-template-columns:1fr; } }
    .ws-char-count { font-size:12px; color:var(--muted-foreground); margin-top:6px; }

    /* ── Buttons ─────────────────────────────────────────── */
    .ws-btn-primary {
      height:44px; padding:0 24px; border-radius:12px;
      background:var(--foreground); color:var(--background);
      border:none; font-size:13px; font-weight:500; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
      transition:opacity .15s; white-space:nowrap;
    }
    .ws-btn-primary:hover { opacity:.85; }
    .ws-btn-secondary {
      height:44px; padding:0 24px; border-radius:12px;
      background:transparent; color:var(--foreground);
      border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
      transition:background .15s; white-space:nowrap;
    }
    .ws-btn-secondary:hover { background:rgba(0,0,0,.04); }
    .ws-btn-sm {
      height:36px; padding:0 14px; border-radius:8px;
      border:1px solid var(--border); background:var(--background);
      font-size:12px; font-weight:500; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px;
      color:var(--foreground); transition:background .15s;
    }
    .ws-btn-sm:hover { background:rgba(0,0,0,.04); }
    .ws-btn-danger-sm {
      height:36px; padding:0 14px; border-radius:8px;
      border:1px solid #fecaca; background:#fef2f2;
      font-size:12px; font-weight:500; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px;
      color:#b91c1c; transition:background .15s;
    }
    .ws-btn-danger-sm:hover { background:#fee2e2; }
    .ws-btn-trash {
      background:none; border:none; cursor:pointer;
      padding:6px; border-radius:6px;
      color:var(--muted-foreground);
      transition:background .12s, color .12s;
      display:inline-flex; align-items:center;
    }
    .ws-btn-trash:hover { background:#fef2f2; color:#b91c1c; }
    .ws-save-row { display:flex; justify-content:flex-end; padding-top:16px; }

    /* ── Avatar / photo ──────────────────────────────────── */
    .ws-photo-row  { display:flex; align-items:flex-start; gap:24px; }
    .ws-avatar-wrap { position:relative; flex-shrink:0; }
    .ws-avatar-lg {
      width:88px; height:88px; border-radius:50%;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:28px; font-weight:500;
    }
    .ws-avatar-cam {
      position:absolute; bottom:0; right:0;
      width:28px; height:28px; border-radius:50%;
      background:var(--foreground); color:var(--background);
      border:2px solid var(--card);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }

    /* ── Chips ───────────────────────────────────────────── */
    .ws-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .ws-chip-blue {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 10px; border-radius:6px;
      background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8;
      font-size:12px; font-weight:500;
    }
    .ws-chip-blue button {
      background:none; border:none; cursor:pointer; padding:0;
      line-height:0; color:#1d4ed8; border-radius:50%;
      display:inline-flex; align-items:center;
    }
    .ws-chip-purple {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 10px; border-radius:6px;
      background:#faf5ff; border:1px solid #ddd6fe; color:#6d28d9;
      font-size:12px; font-weight:500;
    }

    /* ── Portfolio ───────────────────────────────────────── */
    .ws-portfolio-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:600px){ .ws-portfolio-grid { grid-template-columns:1fr; } }
    .ws-portfolio-card {
      border:1px solid var(--border); border-radius:12px; overflow:hidden;
      background:rgba(0,0,0,.015); transition:box-shadow .2s;
    }
    .ws-portfolio-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.10); }
    .ws-portfolio-thumb { height:180px; overflow:hidden; background:var(--secondary); }
    .ws-portfolio-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .ws-portfolio-body { padding:16px; }
    .ws-portfolio-title-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
    .ws-portfolio-title { font-size:14px; font-weight:500; }
    .ws-portfolio-desc  {
      font-size:12px; color:var(--muted-foreground); line-height:1.55; margin-bottom:10px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .ws-ext-link { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; color:#2563eb; text-decoration:none; }
    .ws-ext-link:hover { color:#1d4ed8; }
    .ws-empty-state {
      text-align:center; padding:48px 24px;
      border:2px dashed var(--border); border-radius:12px;
    }
    .ws-empty-text { font-size:13px; color:var(--muted-foreground); margin-bottom:16px; margin-top:8px; }

    /* ── Payout ──────────────────────────────────────────── */
    .ws-payout-card {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px; border:1px solid var(--border); border-radius:12px;
      background:rgba(0,0,0,.015); margin-bottom:10px;
    }
    .ws-payout-card:last-child { margin-bottom:0; }
    .ws-payout-left  { display:flex; align-items:center; gap:14px; }
    .ws-payout-icon  {
      width:48px; height:48px; border-radius:10px;
      background:var(--background); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .ws-payout-name   { font-size:13px; font-weight:500; margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .ws-payout-detail { font-size:12px; color:var(--muted-foreground); }
    .ws-badge-primary {
      display:inline-block; padding:2px 8px; border-radius:4px;
      background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d;
      font-size:11px; font-weight:500;
    }
    .ws-info-box {
      display:flex; gap:12px; padding:16px; border-radius:12px;
      background:#eff6ff; border:1px solid #bfdbfe; margin-top:16px;
    }
    .ws-info-title { font-size:13px; font-weight:500; color:#1e3a5f; margin-bottom:4px; }
    .ws-info-body  { font-size:12px; color:#1d4ed8; line-height:1.55; }

    /* ── Notifications ───────────────────────────────────── */
    .ws-notif-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px; border:1px solid var(--border); border-radius:12px;
      background:rgba(0,0,0,.015); margin-bottom:10px;
    }
    .ws-notif-row:last-child { margin-bottom:0; }
    .ws-notif-label { font-size:13px; font-weight:500; margin-bottom:3px; }
    .ws-notif-desc  { font-size:12px; color:var(--muted-foreground); }
    .ws-toggle {
      position:relative; width:44px; height:24px; border-radius:9999px;
      border:none; cursor:pointer; flex-shrink:0; margin-left:16px;
      background:var(--secondary); transition:background .2s;
    }
    .ws-toggle.on { background:var(--foreground); }
    .ws-toggle-knob {
      position:absolute; top:3px; left:3px;
      width:18px; height:18px; border-radius:50%;
      background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.18);
      transition:transform .2s;
    }
    .ws-toggle.on .ws-toggle-knob { transform:translateX(20px); }

    /* ── Security ────────────────────────────────────────── */
    .ws-security-block {
      border:1px solid var(--border); border-radius:12px;
      padding:24px; background:rgba(0,0,0,.015); margin-bottom:16px;
    }
    .ws-security-block:last-child { margin-bottom:0; }
    .ws-security-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
    .ws-security-title  { font-size:14px; font-weight:500; margin-bottom:4px; }
    .ws-security-sub    { font-size:12px; color:var(--muted-foreground); }
    .ws-2fa-badge {
      padding:5px 12px; border-radius:6px; border:1px solid;
      font-size:12px; font-weight:500;
    }
    .ws-2fa-badge.enabled  { background:#f0fdf4; border-color:#bbf7d0; color:#15803d; }
    .ws-2fa-badge.disabled { background:#f9fafb; border-color:#e5e7eb; color:#4b5563; }
    .ws-activity-row {
      display:flex; align-items:center; padding:12px;
      border:1px solid var(--border); border-radius:8px;
      background:var(--background); margin-bottom:8px;
    }
    .ws-activity-row:last-child { margin-bottom:0; }
    .ws-activity-icon {
      width:40px; height:40px; border-radius:8px;
      background:rgba(0,0,0,.06);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-right:12px;
    }
    .ws-activity-device { font-size:13px; font-weight:500; margin-bottom:2px; display:flex; align-items:center; gap:6px; }
    .ws-activity-meta   { font-size:12px; color:var(--muted-foreground); }
    .ws-current-badge {
      padding:2px 8px; border-radius:4px;
      background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d;
      font-size:11px; font-weight:500;
    }

    /* ── Modals ──────────────────────────────────────────── */
    .ws-modal-backdrop {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45); backdrop-filter:blur(4px);
      z-index:9999; align-items:center; justify-content:center; padding:16px;
    }
    .ws-modal-backdrop.open { display:flex; }
    .ws-modal {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:32px;
      box-shadow:0 20px 60px rgba(0,0,0,.20);
      width:100%; max-height:90vh; overflow-y:auto;
    }
    .ws-modal-sm { max-width:440px; }
    .ws-modal-md { max-width:620px; }
    .ws-modal-title   { font-size:19px; font-weight:500; margin-bottom:4px; }
    .ws-modal-sub     { font-size:13px; color:var(--muted-foreground); margin-bottom:24px; }
    .ws-modal-fields  { display:flex; flex-direction:column; gap:16px; margin-bottom:24px; }
    .ws-modal-actions { display:flex; gap:12px; }
    .ws-modal-actions .ws-btn-secondary,
    .ws-modal-actions .ws-btn-primary { flex:1; justify-content:center; }
    .ws-upload-zone {
      border:2px dashed var(--border); border-radius:12px;
      padding:32px; text-align:center; cursor:pointer;
      transition:border-color .15s;
    }
    .ws-upload-zone:hover { border-color:var(--foreground); }
    .ws-upload-zone i { color:var(--muted-foreground); margin-bottom:10px; display:block; margin:0 auto 10px; }
    .ws-upload-main { font-size:13px; color:var(--muted-foreground); margin-bottom:4px; }
    .ws-upload-sub  { font-size:12px; color:var(--muted-foreground); opacity:.7; }

    /* ── Phone input group ────────────────────────────────── */
    .ws-phone-group {
      display:flex; gap:10px; align-items:flex-start;
    }
    .ws-phone-country {
      width:170px; flex-shrink:0; height:44px; padding:0 10px;
      border:1px solid var(--border); border-radius:8px;
      background:rgba(0,0,0,.025); font-size:13px;
      color:var(--foreground); outline:none; cursor:pointer;
      font-family:inherit;
      transition:box-shadow .15s, border-color .15s;
      box-sizing:border-box;
    }
    .ws-phone-country:focus {
      border-color:var(--foreground);
      box-shadow:0 0 0 3px rgba(0,0,0,.06);
    }
    .ws-phone-number-wrap { flex:1; position:relative; }
    .ws-phone-number-wrap i {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      width:16px; height:16px; color:var(--muted-foreground); pointer-events:none;
    }
    .ws-phone-number-wrap .ws-input { padding-left:38px; width:100%; box-sizing:border-box; }
    .ws-phone-hint {
      font-size:11px; color:var(--muted-foreground); margin-top:4px;
      display:flex; align-items:center; gap:4px;
    }
    .ws-phone-hint i { width:12px; height:12px; }
    .ws-input.ws-input-error {
      border-color:#ef4444 !important;
      box-shadow:0 0 0 2px rgba(239,68,68,0.15) !important;
    }
    .ws-input.ws-input-valid {
      border-color:#10b981 !important;
      box-shadow:0 0 0 2px rgba(16,185,129,0.12) !important;
    }
    .ws-phone-error {
      color:#ef4444; font-size:12px; margin-top:4px;
      display:flex; align-items:center; gap:4px;
      animation:wsPhoneErrIn .2s ease;
    }
    @keyframes wsPhoneErrIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .ws-btn-primary:disabled {
      opacity:0.5; cursor:not-allowed;
    }
  </style>
</head>
<body></body>

<script>
/* ════════════════════════════════════════════════════════
   STATE  — must be global so all functions can access it
════════════════════════════════════════════════════════ */
var wsState = {
  activeTab: 'profile',
  profileData: {},
  professionalData: { skills: [], languages: [] },
  portfolioProjects: []
};

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function wsPayoutIconData(type) {
  if (type==='bank')   return { icon:'landmark',    color:'#2563eb' };
  if (type==='paypal') return { icon:'wallet',      color:'#7c3aed' };
  if (type==='wise')   return { icon:'dollar-sign', color:'#16a34a' };
  return { icon:'wallet', color:'#6b7280' };
}

function wsIsMobile(device) {
  return device.indexOf('iPhone')!==-1 || device.indexOf('iPad')!==-1;
}

/* ════════════════════════════════════════════════════════
   MODAL OPEN / CLOSE  — global so onclick attrs work
════════════════════════════════════════════════════════ */
function wsOpenModal(id)  { document.getElementById(id).classList.add('open'); }
function wsCloseModal(id) { document.getElementById(id).classList.remove('open'); }

/* ════════════════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════════════════ */
function wsSwitchTab(tabId, btn) {
  wsState.activeTab = tabId;
  document.querySelectorAll('.ws-tab').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.ws-nav-btn').forEach(function(el){ el.classList.remove('active'); });
  var panel = document.getElementById('ws-tab-' + tabId);
  if (panel) panel.classList.add('active');
  if (btn)   btn.classList.add('active');
}

/* ════════════════════════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════════════════════════ */
function wsRenderSkills() {
  var wrap = document.getElementById('wsSkillsWrap');
  if (!wrap) return;
  wrap.innerHTML = wsState.professionalData.skills.map(function(skill) {
    return '<div class="ws-chip-blue">'
      + '<span>' + skill + '</span>'
      + '<button onclick="wsRemoveSkill(\'' + skill + '\')" title="Remove">'
      + '<i data-lucide="x" style="width:11px;height:11px;"></i></button>'
      + '</div>';
  }).join('');
  if (window.lucide) lucide.createIcons();
}

function wsRenderPortfolio() {
  var wrap = document.getElementById('wsPortfolioGrid');
  if (!wrap) return;
  if (wsState.portfolioProjects.length === 0) {
    wrap.innerHTML = '<div class="ws-empty-state">'
      + '<i data-lucide="folder-open" style="width:48px;height:48px;display:block;margin:0 auto;"></i>'
      + '<div class="ws-empty-text">No portfolio projects yet.<br>Add your first project to showcase your work.</div>'
      + '<button class="ws-btn-primary" onclick="wsOpenModal(\'wsPortfolioModal\')">'
      + '<i data-lucide="plus" style="width:15px;height:15px;"></i>Add Your First Project</button>'
      + '</div>';
  } else {
    wrap.innerHTML = '<div class="ws-portfolio-grid">'
      + wsState.portfolioProjects.map(function(p) {
          return '<div class="ws-portfolio-card">'
            + '<div class="ws-portfolio-thumb"><img src="' + p.thumbnail + '" alt="' + p.title + '" loading="lazy" /></div>'
            + '<div class="ws-portfolio-body">'
            + '<div class="ws-portfolio-title-row">'
            + '<div class="ws-portfolio-title">' + p.title + '</div>'
            + '<button class="ws-btn-trash" onclick="wsRemovePortfolioProject(\'' + p.id + '\')" title="Remove project">'
            + '<i data-lucide="trash-2" style="width:14px;height:14px;"></i></button></div>'
            + '<div class="ws-portfolio-desc">' + p.description + '</div>'
            + '<a href="' + p.url + '" target="_blank" rel="noopener noreferrer" class="ws-ext-link">'
            + '<i data-lucide="external-link" style="width:12px;height:12px;"></i>View Project</a>'
            + '</div></div>';
        }).join('')
      + '</div>';
  }
  if (window.lucide) lucide.createIcons();
}

function wsRenderPayoutMethods() {
  var wrap = document.getElementById('wsPayoutList');
  if (!wrap) return;
  if (wsState.payoutMethods.length === 0) {
    wrap.innerHTML = '<div class="ws-empty-state">'
      + '<i data-lucide="wallet" style="width:40px;height:40px;display:block;margin:0 auto;"></i>'
      + '<div class="ws-empty-text">No payout methods added yet.</div>'
      + '</div>';
  } else {
    wrap.innerHTML = wsState.payoutMethods.map(function(m) {
      var icon = wsPayoutIconData(m.type);
      return '<div class="ws-payout-card">'
        + '<div class="ws-payout-left">'
        + '<div class="ws-payout-icon"><i data-lucide="' + icon.icon + '" style="width:20px;height:20px;color:' + icon.color + ';"></i></div>'
        + '<div><div class="ws-payout-name">' + m.name
        + (m.isPrimary ? ' <span class="ws-badge-primary">Primary</span>' : '')
        + '</div><div class="ws-payout-detail">' + m.details + '</div></div>'
        + '</div>'
        + '<button class="ws-btn-trash" onclick="wsRemovePayoutMethod(\'' + m.id + '\')" title="Remove">'
        + '<i data-lucide="trash-2" style="width:16px;height:16px;"></i></button>'
        + '</div>';
    }).join('');
  }
  if (window.lucide) lucide.createIcons();
}

function wsRenderNotifications() {
  var wrap = document.getElementById('wsNotifList');
  if (!wrap) return;
  wrap.innerHTML = wsState.notificationSettings.map(function(n) {
    return '<div class="ws-notif-row">'
      + '<div><div class="ws-notif-label">' + n.label + '</div>'

function wsValidateAndSaveProfile() {
  const name  = document.getElementById('wsFullName')?.value.trim() || '';
  const email = document.getElementById('wsEmail')?.value.trim() || '';
  const phoneVal = document.getElementById('wsPhone')?.value.trim() || '';
  const countryCode = document.getElementById('wsCountryCode')?.value || '+91';
  const location = document.getElementById('wsLocation')?.value.trim() || '';
  const bio = document.getElementById('wsBio')?.value.trim() || '';

  const { valid } = Validate.form([
    { fieldId: 'wsFullName', value: name,  checks: [v => Validate.required(v, 'Full name'), v => Validate.minLength(v, 2, 'Full name')] },
    { fieldId: 'wsEmail',   value: email, checks: [Validate.email] },
  ]);
  if (!valid) return;

  // Validate phone with country-specific rule
  if (phoneVal) {
    const phoneErr = Validate.validatePhoneNumber(phoneVal, countryCode);
    if (phoneErr) {
      const errEl = document.getElementById('wsPhoneError');
      const phoneInput = document.getElementById('wsPhone');
      if (phoneInput) phoneInput.classList.add('ws-input-error');
      if (errEl) {
        errEl.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' + phoneErr;
        errEl.style.display = 'flex';
      }
      return;
    }
  }

  // Combine country code + phone for storage
  const fullPhone = phoneVal ? (countryCode + phoneVal) : '';

  try {
    const session = typeof Auth !== "undefined" ? Auth.getCurrentUser() : null;
    if (session) {
      Store.updateUser(session.userId, { name, email, phone: fullPhone, phoneCountryCode: countryCode, location, bio });
      const updated = { ...session, name, email };
      localStorage.setItem('lannent_session', JSON.stringify(updated));
    }
  } catch(e) { console.warn('Store update failed', e); }

  Validate.toast('Profile saved successfully!', 'success');
}

function wsSaveProfessional() {
  const jobTitle = document.getElementById('wsJobTitle')?.value.trim() || '';
  const experienceLevel = document.getElementById('wsExpLevel')?.value || '';
  const hourlyRate = document.getElementById('wsHourlyRate')?.value || 0;
  const availability = document.getElementById('wsAvailability')?.value || '';
  
  const session = typeof Auth !== "undefined" ? Auth.getCurrentUser() : null;
  if (session) {
    Store.updateUser(session.userId, { 
      jobTitle, experienceLevel, hourlyRate: parseFloat(hourlyRate), availability,
      skills: wsState.professionalData.skills,
      languages: wsState.professionalData.languages
    });
  }
  Validate.toast('Professional details saved!', 'success');
}

function wsAddSkill() {
  const s = document.getElementById('wsNewSkill')?.value.trim();
  if (s && !wsState.professionalData.skills.includes(s)) {
    wsState.professionalData.skills.push(s);
    wsRenderSkills();
    document.getElementById('wsNewSkill').value = '';
  }
}


function wsRemoveSkill(skill) {
  wsState.professionalData.skills = wsState.professionalData.skills.filter(function(s){ return s!==skill; });
  wsRenderSkills();
}

function wsRemovePortfolioProject(id) {
  wsState.portfolioProjects = wsState.portfolioProjects.filter(function(p){ return p.id!==id; });
  const session = Auth.getCurrentUser();
  Store.updateUser(session.userId, { portfolioProjects: wsState.portfolioProjects });
  wsRenderPortfolio();

function wsAddPortfolioProject() {
  var titleEl = document.getElementById('wsPortTitle');
  var descEl  = document.getElementById('wsPortDesc');
  var urlEl   = document.getElementById('wsPortUrl');
  var title   = titleEl ? titleEl.value.trim() : '';
  var desc    = descEl  ? descEl.value.trim()  : '';
  var url     = urlEl   ? urlEl.value.trim()   : '';

  if (!title) {
    titleEl && (titleEl.style.borderColor = '#ef4444');
    return;
  }

  // Pick a random Unsplash thumbnail so new cards look real
  var thumbs = [
    'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400&h=300&fit=crop',
  ];
  var thumb = thumbs[Math.floor(Math.random() * thumbs.length)];

  wsState.portfolioProjects.push({
    id: Date.now().toString(),
    title: title,
    description: desc || 'No description provided.',
    url: url || '#',
    thumbnail: thumb,
  });

  const session = Auth.getCurrentUser();
  Store.updateUser(session.userId, { portfolioProjects: wsState.portfolioProjects });

  wsRenderPortfolio();
  wsCloseModal('wsPortfolioModal');

  // Reset form
  if (titleEl) { titleEl.value = ''; titleEl.style.borderColor = ''; }
  if (descEl)  descEl.value = '';
  if (urlEl)   urlEl.value = '';
}

function wsRemovePayoutMethod(id) {
  wsState.payoutMethods = wsState.payoutMethods.filter(function(m){ return m.id!==id; });
  wsRenderPayoutMethods();
}

function wsAddPayoutMethod() {
  var typeEl   = document.getElementById('wsPayoutType');
  var detailEl = document.getElementById('wsPayoutDetail');
  var detail   = detailEl ? detailEl.value.trim() : '';

  if (!detail) {
    detailEl && (detailEl.style.borderColor = '#ef4444');
    return;
  }

  var type  = typeEl ? typeEl.value : 'bank';
  var names = { bank:'Bank Account', paypal:'PayPal', wise:'Wise' };

  wsState.payoutMethods.push({
    id: Date.now().toString(),
    type: type,
    name: names[type] || type,
    details: detail,
    isPrimary: false,
  });

  wsRenderPayoutMethods();
  wsCloseModal('wsPayoutModal');

  if (detailEl) { detailEl.value = ''; detailEl.style.borderColor = ''; }
}

function wsToggleNotif(id, btn) {
  wsState.notificationSettings = wsState.notificationSettings.map(function(n) {
    return n.id === id ? Object.assign({}, n, { enabled: !n.enabled }) : n;
  });
  btn.classList.toggle('on');

  /** Update placeholder, maxlength, and hint when country changes */
  function wsUpdatePhoneUI() {
    if (!wsCountrySelect || !wsPhoneInput) return;
    var code = wsCountrySelect.value;
    var rule = Validate.getPhoneValidationRule(code);
    wsPhoneInput.setAttribute('maxlength', rule.length);
    wsPhoneInput.setAttribute('placeholder', rule.placeholder);

  /** Real-time phone validation */
  function wsValidatePhoneField() {
    if (!wsPhoneInput) return true;
    var code  = wsCountrySelect ? wsCountrySelect.value : '+91';
    var value = wsPhoneInput.value.trim();

    // Clear previous state
    wsPhoneInput.classList.remove('ws-input-error', 'ws-input-valid');
    if (wsPhoneError) {
      wsPhoneError.style.display = 'none';
      wsPhoneError.innerHTML = '';
    }

    if (!value) {
      if (wsSaveBtn) wsSaveBtn.disabled = false;
      return true;
    }

    var err = Validate.validatePhoneNumber(value, code);
    if (err) {
      wsPhoneInput.classList.add('ws-input-error');
      if (wsPhoneError) {
        wsPhoneError.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' + err;

      }
      if (wsSaveBtn) wsSaveBtn.disabled = true;
      return false;
    } else {
      wsPhoneInput.classList.add('ws-input-valid');
      if (wsSaveBtn) wsSaveBtn.disabled = false;
      return true;
    }
  }

  // Block non-digit characters in real time
  if (wsPhoneInput) {

      this.value = this.value.replace(/\D/g, '');
      wsValidatePhoneField();
    });

    // Prevent paste of non-digits

      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData('text');
      this.value = text.replace(/\D/g, '').substring(0, parseInt(this.getAttribute('maxlength')) || 15);
      wsValidatePhoneField();
    });

    // Block key presses that aren't digits
    wsPhoneInput.addEventListener('keypress', function(e) {
      if (!/[0-9]/.test(e.key)) e.preventDefault();
    });
  }

  // Country code change
  if (wsCountrySelect) {
    wsCountrySelect.addEventListener('change', wsUpdatePhoneUI);
  }

  // Initial setup
  wsUpdatePhoneUI();
});
