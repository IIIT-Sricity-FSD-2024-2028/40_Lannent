<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expert Dashboard — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .audit-card-item { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:12px; transition:box-shadow 0.2s,transform 0.2s; cursor:pointer; }
    .audit-card-item:hover { box-shadow:0 8px 24px rgba(0,0,0,0.08); transform:translateY(-2px); }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('expert')) return;

      // Live stats from store
      const session = typeof Auth !== "undefined" ? Auth.getCurrentUser() : null;
      const userId = session?.userId || 'u3';
      const auditReqs = Store.getAuditRequests();
      const pendingAudits = auditReqs.filter(a => a.status === 'Pending' || a.status === 'In Review').length;
      const openDisputes = Store.getDisputes().filter(d => d.status === 'open').length;
      const expert = Store.getUserById(userId);
      const earned = Store.getTransactionsByUser(userId).filter(t => t.type === 'milestone-release').reduce((s,t) => s+t.amount, 0);

      const auditRequests = [
        { id:1, title:'React E-commerce Dashboard', client:'James T.', type:'Technical Audit', deadline:'2 days', pay:'$280', complexity:'Medium', tags:['React','TypeScript'], urgency:'urgent' },
        { id:2, title:'Node.js REST API Security Review', client:'Sarah K.', type:'Security Audit', deadline:'4 days', pay:'$350', complexity:'High', tags:['Node.js','Security'], urgency:'normal' },
        { id:3, title:'Flutter Mobile App Code Review', client:'Alex M.', type:'Technical Audit', deadline:'5 days', pay:'$220', complexity:'Medium', tags:['Flutter','Dart'], urgency:'normal' },
      ];

      const disputeCases = [
        { id:1, title:'API Integration Dispute', parties:'David P. vs Emma R.', status:'Active', deadline:'3 days', pay:'$200' },
        { id:2, title:'Design Deliverable Conflict', parties:'Tom B. vs Lisa C.', status:'Pending Review', deadline:'5 days', pay:'$180' },
      ];

      const content = `
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div><div class="stat-val">${pendingAudits}</div><div class="stat-label">Pending Audits</div><div class="stat-change">${auditReqs.filter(a=>a.status==='Pending').length} awaiting</div></div>
            <div class="stat-icon-wrap" style="background:#faf5ff;"><i data-lucide="clipboard-check" style="width:20px;height:20px;color:#a855f7;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val">${openDisputes}</div><div class="stat-label">Dispute Cases</div><div class="stat-change">${Store.getDisputes().filter(d=>d.status==='resolved').length} resolved</div></div>
            <div class="stat-icon-wrap" style="background:#eff6ff;"><i data-lucide="scale" style="width:20px;height:20px;color:#6366f1;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val" style="color:#10b981;">$${(earned || 0).toLocaleString()}</div><div class="stat-label">Total Earned</div><div class="stat-change">Lifetime earnings</div></div>
            <div class="stat-icon-wrap" style="background:#ecfdf5;"><i data-lucide="wallet" style="width:20px;height:20px;color:#10b981;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val">${expert?.rating || 0}★</div><div class="stat-label">Expert Rating</div><div class="stat-change">From ${expert?.reviewsDone || 0} reviews</div></div>
            <div class="stat-icon-wrap" style="background:#fffbeb;"><i data-lucide="star" style="width:20px;height:20px;color:#f59e0b;"></i></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <!-- Audit Requests -->
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
              <h3 style="font-size:15px;font-weight:600;">Audit Requests</h3>
              <a href="expert-audit-requests.html" class="btn-outline" style="font-size:13px;padding:5px 12px;">View All</a>
            </div>
            ${Store.getAuditRequests().filter(a => a.expertId === userId || !a.expertId).slice(0, 3).map(a => {
              const ms = Store.getMilestoneById(a.milestoneId);
              const task = ms ? Store.getTaskById(ms.taskId) : null;
              const cl = task ? Store.getUserById(task.clientId) : null;
              const clName = cl ? cl.name : 'Unknown';
              const pTitle = ms ? ms.title : 'Audit Request';
              const pay = ms ? '$' + Math.floor(ms.budget * 0.1).toLocaleString() : '$150';
              const urgency = a.status === 'Pending' ? 'urgent' : 'normal';
              const tags = task ? task.skills || [] : ['Review', 'Audit'];
              
              return `
              <div class="audit-card-item" onclick="window.location.href='expert-audit-requests.html'">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
                  <div>
                    <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${pTitle}</div>
                    <div style="font-size:12px;color:var(--muted-foreground);">Client: ${clName} · Technical Audit</div>
                  </div>
                  <span style="font-weight:700;color:#10b981;font-size:14px;flex-shrink:0;margin-left:12px;">${pay}</span>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <div style="display:flex;gap:6px;">
                    ${tags.slice(0,2).map(t => `<span class="skill-tag" style="font-size:11px;padding:2px 8px;">${t}</span>`).join('')}
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    ${urgency === 'urgent' ? '<span style="font-size:11px;font-weight:700;color:#ef4444;background:#fee2e2;padding:2px 8px;border-radius:9999px;">New</span>' : ''}
                    <span style="font-size:12px;color:var(--muted-foreground);">
                      <i data-lucide="clock" style="width:12px;height:12px;display:inline;vertical-align:middle;"></i> ${a.status}
                    </span>
                  </div>
                </div>
              </div>`;
            }).join('') || '<div style="padding:20px;text-align:center;color:var(--muted-foreground);font-size:13px;">No active audit requests.</div>'}
          </div>

          <!-- Dispute Cases -->
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
              <h3 style="font-size:15px;font-weight:600;">Dispute Cases</h3>
              <a href="expert-dispute-cases.html" class="btn-outline" style="font-size:13px;padding:5px 12px;">View All</a>
            </div>
            ${Store.getDisputes().filter(d => d.expertId === userId || !d.expertId).slice(0, 3).map(d => {
              const ms = Store.getMilestoneById(d.milestoneId);
              const task = ms ? Store.getTaskById(ms.taskId) : null;
              const cl = task ? Store.getUserById(task.clientId) : null;
              const wkr = task && task.workerId ? Store.getUserById(task.workerId) : null;
              
              const clName = cl ? cl.name.split(' ')[0] : 'Client';
              const wName = wkr ? wkr.name.split(' ')[0] : 'Worker';
              const pTitle = ms ? ms.title : 'Dispute Case';
              const pay = ms ? '$' + Math.floor(ms.budget * 0.15).toLocaleString() : '$200';
              
              return `
              <div class="audit-card-item" onclick="window.location.href='expert-dispute-cases.html'">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                  <div>
                    <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${pTitle}</div>
                    <div style="font-size:12px;color:var(--muted-foreground);">${clName} vs ${wName}</div>
                  </div>
                  <span style="font-weight:700;color:#10b981;font-size:14px;">${pay}</span>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <span class="badge ${d.status === 'open' ? 'badge-orange' : 'badge-blue'}" style="text-transform:capitalize;">${d.status}</span>
                  <span style="font-size:12px;color:var(--muted-foreground);">
                    <i data-lucide="alert-circle" style="width:12px;height:12px;display:inline;vertical-align:middle;"></i> Dispute
                  </span>
                </div>
              </div>`;
            }).join('') || '<div style="padding:20px;text-align:center;color:var(--muted-foreground);font-size:13px;">No active dispute cases.</div>'}

          </div>
        </div>
      `;

      initDashboard({
        role: 'expert',
        activePath: 'expert-dashboard.html',
        pageTitle: 'Expert Dashboard',
        pageSubtitle: 'Manage your audit requests and dispute cases',
        content
      });
      lucide.createIcons();
    });
  </script>
</head>
<body></body>
</html>
