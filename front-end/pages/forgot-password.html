<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#f8f7ff 0%,#f0edff 100%);padding:24px;">
    <div style="width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:32px;">
        <a href="../index.html" style="font-size:20px;font-weight:700;color:#0f172a;text-decoration:none;">Lannent<span style="color:#f43f5e;">.</span></a>
      </div>
      <div id="step1Card" class="auth-card">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i data-lucide="key" style="color:white;width:24px;height:24px;"></i>
          </div>
          <h2 style="font-size:22px;font-weight:600;margin-bottom:8px;">Forgot your password?</h2>
          <p style="font-size:14px;color:var(--muted-foreground);">No problem. Enter your email and we'll send you a reset link.</p>
        </div>
        <form id="forgotForm">
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input type="email" class="form-input" placeholder="you@example.com" id="forgotEmail" />
          </div>
          <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>
        <p class="auth-footer-text"><a href="login.html">← Back to login</a></p>
      </div>
      <div id="step2Card" class="auth-card" style="display:none;text-align:center;">
        <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
          <i data-lucide="mail" style="color:white;width:32px;height:32px;"></i>
        </div>
        <h2 style="font-size:22px;font-weight:600;margin-bottom:8px;">Check your email</h2>
        <p style="font-size:14px;color:var(--muted-foreground);margin-bottom:24px;">We've sent a password reset link to your email address. Check your inbox (and spam folder).</p>
        <a href="login.html" class="btn-primary" style="display:block;padding:12px;border-radius:12px;text-align:center;text-decoration:none;">Back to Login</a>
      </div>
    </div>
  </div>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    lucide.createIcons();
    document.getElementById('forgotEmail')?.addEventListener('input', () => Validate.clearError('forgotEmail'));
    document.getElementById('forgotForm').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      const { valid } = Validate.form([
        { fieldId: 'forgotEmail', value: email, checks: [Validate.email] },
      ]);
      if (!valid) return;
      document.getElementById('step1Card').style.display = 'none';
      document.getElementById('step2Card').style.display = 'block';
    });
  </script>
</body>
</html>
