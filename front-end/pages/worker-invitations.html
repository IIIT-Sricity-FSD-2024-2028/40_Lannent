<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitations — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('worker')) return;
      const session = Auth.getCurrentUser();
      let invitations = [];

      function loadInvitations() {
        const raw = Store.getInvitationsByWorker(session.userId);
        invitations = raw.map(p => {
          const task = Store.getTaskById(p.taskId);
          const client = task && task.clientId ? Store.getUserById(task.clientId) : null;
          return {
            id: p.id,
            projectName: task ? task.title : 'Unknown Task',
            client: client ? client.name : 'Unknown Client',
            budget: task ? task.budget : 0,
            status: (p.status || '').toLowerCase() === 'pending' ? 'Pending' : (p.status || '').toLowerCase() === 'hired' ? 'Accepted' : 'Declined',
            rawStatus: p.status,
            received: p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'Recently',
            message: p.coverLetter || '',
            taskId: p.taskId
          };
        });
      }

      function renderInvitations(filter) {
        const list = filter === 'all' ? invitations : invitations.filter(p => p.status.toLowerCase() === filter);
        if (!list.length) return `
          <div style="padding:64px 32px;text-align:center;color:var(--muted-foreground);">
            <div style="width:48px;height:48px;background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
              <i data-lucide="mail-open" style="width:22px;height:22px;"></i>
            </div>
            <div style="font-size:16px;font-weight:600;margin-bottom:6px;">No invitations found</div>
            <div style="font-size:14px;margin-bottom:20px;">You are all caught up on your project invitations.</div>
          </div>`;
          
        const statusBadgeMap = { 'Pending': 'badge-orange', 'Accepted': 'badge-green', 'Declined': 'badge-red' };
        
        return list.map(p => `
          <div id="invite-row-${p.id}" style="padding:20px 24px;border-bottom:1px solid rgba(0,0,0,0.05);display:flex;align-items:flex-start;gap:16px;transition:background 0.15s;" onmouseenter="this.style.background='#f8f9fb'" onmouseleave="this.style.background='transparent'">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
                <span style="font-weight:600;font-size:15px;">${p.projectName}</span>
                <span class="badge ${statusBadgeMap[p.status] || 'badge-blue'}">${p.status}</span>
              </div>
              <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;">
                <span style="font-size:12px;color:var(--muted-foreground);display:flex;align-items:center;gap:4px;"><i data-lucide="user" style="width:12px;height:12px;"></i>${p.client}</span>
                <span style="font-size:12px;color:var(--muted-foreground);display:flex;align-items:center;gap:4px;"><i data-lucide="calendar" style="width:12px;height:12px;"></i>Received ${p.received}</span>
              </div>
              <p style="font-size:13px;color:#475569;line-height:1.5;margin-top:12px;background:var(--input-bg);padding:12px;border-radius:12px;border-left:3px solid #6366f1;">
                <strong>Message:</strong><br>${p.message}
              </p>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:18px;font-weight:700;color:#10b981;margin-bottom:12px;">$${typeof p.budget === 'number' ? p.budget.toLocaleString() : p.budget} Budget</div>
              
              ${p.status === 'Pending' ? `
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                  <button class="btn-primary" style="font-size:13px;padding:8px 16px;border-radius:10px;" onclick="acceptInvite('${p.id}')">Accept</button>
                  <button class="btn-outline" style="font-size:13px;padding:8px 16px;border-radius:10px;color:#ef4444;border-color:#fecaca;" onclick="declineInvite('${p.id}')">Reject</button>
                </div>
              ` : ''}
              
              ${p.status === 'Accepted' ? `
                <a href="worker-workroom.html?id=${p.taskId}" class="btn-primary" style="display:inline-block;font-size:13px;padding:8px 16px;border-radius:10px;text-decoration:none;">Go to Project</a>
              ` : ''}
            </div>
          </div>`).join('');
      }

      function buildContent() {
        loadInvitations();
        const counts = {
          all: invitations.length,
          pending: invitations.filter(p=>p.status==='Pending').length,
          accepted: invitations.filter(p=>p.status==='Accepted').length,
          declined: invitations.filter(p=>p.status==='Declined').length
        };
        
        return `
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
            <div class="stat-card"><div><div class="stat-val">${counts.all}</div><div class="stat-label">Total</div></div><div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="mail" style="width:20px;height:20px;color:#6366f1;"></i></div></div>
            <div class="stat-card"><div><div class="stat-val">${counts.pending}</div><div class="stat-label">Pending</div></div><div class="stat-icon-wrap" style="background:#fff7ed;"><i data-lucide="clock" style="width:20px;height:20px;color:#f97316;"></i></div></div>
            <div class="stat-card"><div><div class="stat-val" style="color:#10b981;">${counts.accepted}</div><div class="stat-label">Accepted</div></div><div class="stat-icon-wrap" style="background:#ecfdf5;"><i data-lucide="check-circle" style="width:20px;height:20px;color:#10b981;"></i></div></div>
            <div class="stat-card"><div><div class="stat-val">${counts.declined}</div><div class="stat-label">Declined</div></div><div class="stat-icon-wrap" style="background:#fee2e2;"><i data-lucide="x-circle" style="width:20px;height:20px;color:#ef4444;"></i></div></div>
          </div>
          <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
            <div style="padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
              <div id="filterBar" style="display:flex;gap:4px;background:var(--input-bg);padding:4px;border-radius:12px;overflow-x:auto;">
                ${[['all','All'],['pending','Pending'],['accepted','Accepted'],['declined','Declined']].map(([val,label],i) => `
                  <button onclick="filterInvitations('${val}',this)" style="padding:6px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;background:${i===0?'var(--card)':'transparent'};color:${i===0?'var(--foreground)':'var(--muted-foreground)'};box-shadow:${i===0?'0 1px 4px rgba(0,0,0,0.08)':'none'};white-space:nowrap;">${label}</button>`).join('')}
              </div>
            </div>
            <div id="invitationsContainer">${renderInvitations('all')}</div>
          </div>`;
      }

      initDashboard({ role:'worker', activePath:'worker-invitations.html', pageTitle:'Invitations', pageSubtitle:'Review and respond to client project invitations', content: buildContent() });
      lucide.createIcons();

      window.filterInvitations = function(filter, btn) {
        document.querySelectorAll('#filterBar button').forEach(b => {
          b.style.background = 'transparent'; b.style.color = 'var(--muted-foreground)'; b.style.boxShadow = 'none';
        });
        btn.style.background = 'var(--card)'; btn.style.color = 'var(--foreground)'; btn.style.boxShadow = '0 1px 4px rgba(0,0,0,0.08)';
        const c = document.getElementById('invitationsContainer');
        if (c) { c.innerHTML = renderInvitations(filter); lucide.createIcons(); }
      };

      window.acceptInvite = function(id) {
        Validate.confirm('Accept this invitation? The project will be moved to your active projects and escrow will be locked.', () => {
          Store.acceptInvitation(id);
          const c = document.getElementById('pageContent');
          if (c) { 
            c.innerHTML = '<div class="page-header"><h1 class="page-title">Invitations</h1><p class="page-sub">Review and respond to client project invitations</p></div>' + buildContent(); 
            lucide.createIcons();
          }
          Validate.toast('Invitation accepted! Project is now active in My Projects.', 'success');
        });
      };
      
      window.declineInvite = function(id) {
        Validate.confirm('Reject this invitation? The client will be notified.', () => {
          Store.declineInvitation(id);
          const c = document.getElementById('pageContent');
          if (c) { 
            c.innerHTML = '<div class="page-header"><h1 class="page-title">Invitations</h1><p class="page-sub">Review and respond to client project invitations</p></div>' + buildContent(); 
            lucide.createIcons();
          }
          Validate.toast('Invitation rejected.', 'success');
        });
      };
    });
  </script>
</head>
<body></body>
</html>
