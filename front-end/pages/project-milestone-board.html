<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milestone Board — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .kanban-board { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start; }
    .kanban-col { border-radius:16px; background:var(--input-bg); padding:16px; min-height:400px; }
    .kanban-col-header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .kanban-col-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
    .kanban-count { margin-left:auto; min-width:22px; height:22px; border-radius:11px; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 6px; }
    .kanban-card { background:white; border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:10px; cursor:pointer; transition:box-shadow 0.2s,transform 0.2s; }
    .kanban-card:hover { box-shadow:0 8px 24px rgba(0,0,0,0.1); transform:translateY(-2px); }
    .kanban-card:last-child { margin-bottom:0; }
    .card-title { font-weight:600; font-size:14px; color:var(--foreground); margin-bottom:8px; }
    .card-meta { font-size:12px; color:var(--muted-foreground); display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .card-amount { font-size:13px; font-weight:700; color:#10b981; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid rgba(0,0,0,0.05); }
    @media(max-width:1024px){ .kanban-board{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:640px){ .kanban-board{ grid-template-columns:1fr; } }
  </style>
  <script>
    // ── Store-backed milestone board ────────────────────────
    const prioColors = { High:'#ef4444', Medium:'#f59e0b', Low:'#10b981', Normal:'#6366f1' };

    function loadMilestonesFromStore(taskId) {
      if (!taskId) {
        // fallback: use seed milestones
        const session = (typeof Auth !== 'undefined') ? Auth.getCurrentUser() : null;
        if (!session) return { todo:[], inProgress:[], review:[], disputed:[], done:[] };
        const tasks = Store.getTasksByClient(session.userId);
        taskId = tasks[0]?.id;
      }
      const all = taskId ? Store.getMilestonesByTask(taskId) : [];
      const colMap = { todo:[], inProgress:[], review:[], disputed:[], done:[] };
      all.forEach(m => {
        const worker = m.workerId ? Store.getUserById(m.workerId) : null;
        const card = {
          id: m.id,
          title: m.title,
          desc: m.description || '',
          amount: '$' + (m.budget||0).toLocaleString(),
          due: m.dueDate ? new Date(m.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'No date',
          assignee: worker ? worker.avatar : '?',
          assigneeColor: worker ? worker.avatarColor : '#94a3b8',
          priority: m.priority || 'Medium',
          progress: m.progress || 0,
          status: m.status || 'todo',
          rawId: m.id,
          taskId: m.taskId
        };
        if (m.status === 'completed' || m.status === 'approved' || m.status === 'audit-passed') colMap.done.push(card);
        else if (m.status === 'review' || m.status === 'submitted') colMap.review.push(card);
        else if (m.status === 'disputed') colMap.disputed.push(card);
        else if (m.status === 'in-progress') colMap.inProgress.push(card);
        else colMap.todo.push(card);
      });
      return colMap;
    }


    function renderCard(m, col) {
      const isReview = col === 'review';
      const isDone   = col === 'done';
      const isDisp   = col === 'disputed';
      const pc = prioColors[m.priority] || '#6366f1';
      return `
        <div class="kanban-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
            <div class="card-title" style="flex:1;margin-bottom:0;">${m.title}</div>
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px;margin-left:8px;background:${pc}20;color:${pc};white-space:nowrap;">${m.priority}</span>
          </div>
          <p style="font-size:12px;color:var(--muted-foreground);line-height:1.5;margin-bottom:10px;">${m.desc}</p>
          ${m.progress !== undefined ? `
            <div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;">
                <span style="color:var(--muted-foreground);">Progress</span>
                <span style="font-weight:700;color:#6366f1;">${m.progress}%</span>
              </div>
              <div style="height:5px;border-radius:9999px;background:var(--muted);overflow:hidden;">
                <div style="height:100%;border-radius:9999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:${m.progress}%;"></div>
              </div>
            </div>` : ''}
          <div class="card-footer">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:26px;height:26px;border-radius:50%;background:${m.assigneeColor};display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;">${m.assignee}</div>
              <div class="card-meta" style="margin-bottom:0;">
                <i data-lucide="clock" style="width:11px;height:11px;"></i>
                ${m.due}
              </div>
            </div>
            <span class="card-amount">${m.amount}</span>
          </div>
          ${isDone ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.05);text-align:center;"><span style="font-size:12px;color:#10b981;font-weight:600;">✓ Approved &amp; Paid</span></div>` : ''}
          ${isReview ? `<div style="margin-top:10px;"><button onclick="event.stopPropagation(); window.location.href='review-deliverable.html?milestoneId=${m.rawId}&role=client'" style="width:100%;padding:8px;border-radius:8px;background:#0ea5e9;color:white;border:none;font-size:12px;font-weight:600;cursor:pointer;"><i data-lucide="eye" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:6px;"></i>Review Deliverable</button></div>` : ''}
          ${isDisp ? `<div style="margin-top:10px;text-align:center;color:#b91c1c;font-weight:700;font-size:12px;">⚠ Dispute Active</div>` : ''}
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('client')) return;
      const session = Auth.getCurrentUser();
      const params = new URLSearchParams(window.location.search);
      const taskId = params.get('id');
      const task = taskId ? Store.getTaskById(taskId) : null;

      let milestones = loadMilestonesFromStore(taskId);


      const allMs = [...milestones.todo,...milestones.inProgress,...milestones.review,...milestones.disputed,...milestones.done];
      const doneMs = milestones.done.length;
      const totalBudget = allMs.reduce((s,m)=>s+parseFloat((m.amount||'$0').replace(/[^0-9.]/g,'')||0),0);
      const releasedAmt = milestones.done.reduce((s,m)=>s+parseFloat((m.amount||'$0').replace(/[^0-9.]/g,'')||0),0);
      const released = '$' + releasedAmt.toLocaleString();
      const pending = '$' + (totalBudget - releasedAmt).toLocaleString();
      const taskTitle = task ? task.title : 'Milestone Board';
      const taskStatus = task ? task.status : 'in-progress';
      const taskDeadline = task && task.deadline ? new Date(task.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
      const progressPct = allMs.length ? Math.round((doneMs/allMs.length)*100) : 0;

      const content = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
          <a href="client-my-projects.html" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted-foreground);transition:color 0.15s;" onmouseenter="this.style.color='var(--foreground)'" onmouseleave="this.style.color='var(--muted-foreground)'">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> My Projects
          </a>
          <span style="color:var(--border);">›</span>
          <span style="font-size:14px;font-weight:500;">${taskTitle}</span>
          <span class="badge badge-blue" style="margin-left:auto;">In Progress</span>
          <a href="milestone-reports.html?role=client" style="display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--foreground);text-decoration:none;transition:background 0.15s;" onmouseenter="this.style.background='var(--secondary)'" onmouseleave="this.style.background='var(--card)'">
            <i data-lucide="file-text" style="width:14px;height:14px;"></i>Reports
          </a>
          <a href="project-workroom.html?id=${taskId}" class="btn-primary" style="font-size:13px;padding:6px 14px;margin-left:4px;">
            <i data-lucide="door-open" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:6px;"></i>Go to Workroom
          </a>
        </div>

        <!-- Project Summary -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
          <div class="stat-card">
            <div><div class="stat-val">${allMs.length}</div><div class="stat-label">Total Milestones</div></div>
            <div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="flag" style="width:20px;height:20px;color:#6366f1;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val" style="color:#10b981;">${released}</div><div class="stat-label">Escrow Released</div></div>
            <div class="stat-icon-wrap" style="background:#ecfdf5;"><i data-lucide="unlock" style="width:20px;height:20px;color:#10b981;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val" style="color:#6366f1;">${pending}</div><div class="stat-label">Escrow Locked</div></div>
            <div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="lock" style="width:20px;height:20px;color:#6366f1;"></i></div>
          </div>
          <div class="stat-card">
            <div><div class="stat-val">${taskDeadline}</div><div class="stat-label">Final Deadline</div></div>
            <div class="stat-icon-wrap" style="background:#fffbeb;"><i data-lucide="calendar" style="width:20px;height:20px;color:#f59e0b;"></i></div>
          </div>
        </div>

        <!-- Overall Progress -->
        <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:24px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span style="font-weight:600;font-size:15px;">Overall Progress</span>
            <div style="display:flex;align-items:center;gap:12px;">
              <span style="font-size:14px;font-weight:700;color:#6366f1;">${progressPct}%</span>
              <a href="messages.html" class="btn-primary" style="font-size:13px;padding:6px 14px;">
                <i data-lucide="message-square" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:6px;"></i>Message Worker
              </a>
            </div>
          </div>
          <div style="height:10px;border-radius:9999px;background:var(--muted);overflow:hidden;">
            <div style="height:100%;border-radius:9999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:${progressPct}%;box-shadow:0 0 10px rgba(99,102,241,0.4);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted-foreground);">
            <span>${doneMs} of ${allMs.length} milestones completed</span>
            <span>22 days remaining</span>
          </div>
        </div>

        <!-- Kanban Board -->
        ${(()=>{const t=[...milestones.todo,...milestones.inProgress,...milestones.review,...milestones.disputed,...milestones.done]; return t.length===0?`<div style="padding:64px;text-align:center;color:var(--muted-foreground);background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:24px;"><i data-lucide="flag" style="width:48px;height:48px;opacity:0.3;margin:0 auto 16px;display:block;"></i><div style="font-size:16px;font-weight:600;margin-bottom:6px;">No milestones yet</div><div style="font-size:14px;">Add milestones when posting or editing this task.</div></div>`:'';})()}
        <div class="kanban-board">
          <div class="kanban-col">
            <div class="kanban-col-header">
              <div style="width:10px;height:10px;border-radius:50%;background:#94a3b8;"></div>
              <span class="kanban-col-title" style="color:#64748b;">To Do</span>
              <span class="kanban-count" style="background:#f1f5f9;color:#64748b;">${milestones.todo.length}</span>
            </div>
            ${milestones.todo.map(m => renderCard(m, 'todo')).join('')}
          </div>
          <div class="kanban-col" style="background:#eef2ff;">
            <div class="kanban-col-header">
              <div style="width:10px;height:10px;border-radius:50%;background:#6366f1;animation:pulse 2s infinite;"></div>
              <span class="kanban-col-title" style="color:#6366f1;">In Progress</span>
              <span class="kanban-count" style="background:#e0e7ff;color:#4f46e5;">${milestones.inProgress.length}</span>
            </div>
            ${milestones.inProgress.map(m => renderCard(m, 'inProgress')).join('')}
          </div>
          <div class="kanban-col" style="background:#fffbeb;">
            <div class="kanban-col-header">
              <div style="width:10px;height:10px;border-radius:50%;background:#f59e0b;"></div>
              <span class="kanban-col-title" style="color:#d97706;">In Review</span>
              <span class="kanban-count" style="background:#fef9c3;color:#b45309;">${milestones.review.length}</span>
            </div>
            ${milestones.review.map(m => renderCard(m, 'review')).join('')}
          </div>
          <div class="kanban-col" style="background:#fef2f2;">
            <div class="kanban-col-header">
              <div style="width:10px;height:10px;border-radius:50%;background:#ef4444;"></div>
              <span class="kanban-col-title" style="color:#b91c1c;">Disputed</span>
              <span class="kanban-count" style="background:#fee2e2;color:#991b1b;">${milestones.disputed.length}</span>
            </div>
            ${milestones.disputed.map(m => renderCard(m, 'disputed')).join('')}
          </div>
          <div class="kanban-col" style="background:#ecfdf5;">
            <div class="kanban-col-header">
              <div style="width:10px;height:10px;border-radius:50%;background:#10b981;"></div>
              <span class="kanban-col-title" style="color:#059669;">Done</span>
              <span class="kanban-count" style="background:#d1fae5;color:#065f46;">${milestones.done.length}</span>
            </div>
            ${milestones.done.map(m => renderCard(m, 'done')).join('')}
          </div>
        </div>
      `;

      initDashboard({
        role: 'client',
        activePath: 'client-my-projects.html',
        pageTitle: 'Milestone Board',
        pageSubtitle: taskTitle,
        content
      });
      lucide.createIcons();
    });

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type === 'success' ? '#10b981' : '#6366f1'};color:white;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.15);animation:fadeUp 0.4s ease;`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</head>
<body></body>
</html>
