<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .messages-wrap { display:flex; height:calc(100vh - 64px - 80px); background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    .convos-list { width:300px; flex-shrink:0; border-right:1px solid var(--border); overflow-y:auto; }
    .convos-header { padding:16px 20px; border-bottom:1px solid var(--border); }
    .chat-area { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-header-bar { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .chat-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
    .chat-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; align-items:flex-end; gap:10px; }
    .chat-textarea { flex:1; padding:10px 14px; border-radius:12px; border:1px solid var(--border); font-size:14px; font-family:inherit; outline:none; resize:none; min-height:40px; max-height:120px; background:var(--input-bg); }
    .msg-sent { display:flex; justify-content:flex-end; }
    .msg-received { display:flex; justify-content:flex-start; gap:8px; }
    .bubble { padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; max-width:70%; }
    .bubble-sent { background:#6366f1; color:white; border-bottom-right-radius:4px; }
    .bubble-received { background:white; border:1px solid var(--border); color:var(--foreground); border-bottom-left-radius:4px; }
    .msg-time { font-size:11px; color:var(--muted-foreground); margin-top:4px; text-align:right; }
    .empty-chat { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--muted-foreground); text-align:center; padding:40px; }
    @media(max-width:640px){ .convos-list{ display:none; } }
  </style>
  <script>
    let conversations = [];
    let activeConvoIdx = 0;

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('client', 'worker', 'expert')) return;

      const session = Auth.getCurrentUser();
      const currentUserId = session?.userId || '';
      const currentRole = session?.role || 'client';

      // Build conversations from real project data
      // For clients: show conversations with workers on their projects
      // For workers: show conversations with clients on their projects
      const allTasks = Store.getTasks();
      const myTasks = allTasks.filter(t => {
        if (currentRole === 'client') return t.clientId === currentUserId && t.workerId;
        if (currentRole === 'worker') return t.workerId === currentUserId && t.clientId;
        return false;
      });

      conversations = myTasks.map(task => {
        const otherId = currentRole === 'client' ? task.workerId : task.clientId;
        const otherUser = Store.getUserById(otherId) || { name: 'Unknown', avatar: '??', avatarColor: 'linear-gradient(135deg,#94a3b8,#64748b)' };
        const taskMessages = Store.getMessagesByTask(task.id);

        // Build message list for this conversation
        const msgs = taskMessages.map(m => ({
          from: m.senderId === currentUserId ? 'me' : 'them',
          text: m.content,
          time: new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        }));

        const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;

        return {
          taskId: task.id,
          otherId: otherId,
          name: otherUser.name,
          avatar: otherUser.avatar || '??',
          color: otherUser.avatarColor || 'linear-gradient(135deg,#94a3b8,#64748b)',
          project: task.title,
          lastMsg: lastMsg ? lastMsg.text : 'No messages yet',
          time: lastMsg ? lastMsg.time : '',
          unread: 0,
          online: true,
          messages: msgs,
        };
      });

      // If no conversations, show empty state
      if (!conversations.length) {
        const content = `
          <div class="messages-wrap">
            <div class="empty-chat" style="width:100%;">
              <i data-lucide="message-square-off" style="width:48px;height:48px;margin-bottom:12px;opacity:0.3;"></i>
              <div style="font-size:16px;font-weight:600;margin-bottom:4px;">No conversations yet</div>
              <div style="font-size:13px;">Messages from your project workrooms will appear here.</div>
            </div>
          </div>`;
        initDashboard({ role: currentRole, activePath: 'messages.html', pageTitle: 'Messages', pageSubtitle: '', content });
        lucide.createIcons();
        return;
      }

      function renderConversations() {
        return conversations.map((c, i) => `
          <div class="conversation-item${i === activeConvoIdx ? ' active' : ''}" onclick="selectConvo(${i})">
            <div style="position:relative;">
              <div style="width:44px;height:44px;border-radius:50%;background:${c.color};display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0;">${c.avatar}</div>
              ${c.online ? '<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid white;"></div>' : ''}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
                <span style="font-weight:600;font-size:14px;">${c.name}</span>
                <span style="font-size:11px;color:var(--muted-foreground);">${c.time}</span>
              </div>
              <div style="font-size:12px;color:var(--muted-foreground);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.lastMsg}</div>
              <div style="font-size:11px;color:var(--muted-foreground);opacity:0.7;">${c.project}</div>
            </div>
            ${c.unread ? `<div style="min-width:20px;height:20px;border-radius:10px;background:#6366f1;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;">${c.unread}</div>` : ''}
          </div>`).join('');
      }

      function renderMessages(convo) {
        if (!convo.messages.length) {
          return `<div class="empty-chat"><i data-lucide="message-square" style="width:36px;height:36px;margin-bottom:8px;opacity:0.3;"></i><div style="font-size:14px;">No messages yet</div><div style="font-size:12px;">Send a message from the <a href="project-workroom.html?id=${convo.taskId}" style="color:#6366f1;">project workroom</a>.</div></div>`;
        }
        return convo.messages.map(m => `
          <div class="${m.from === 'me' ? 'msg-sent' : 'msg-received'}">
            ${m.from === 'them' ? `<div style="width:30px;height:30px;border-radius:50%;background:${convo.color};display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;flex-shrink:0;">${convo.avatar}</div>` : ''}
            <div>
              <div class="bubble ${m.from === 'me' ? 'bubble-sent' : 'bubble-received'}">${m.text}</div>
              <div class="msg-time">${m.time}</div>
            </div>
          </div>`).join('');
      }

      const firstConvo = conversations[0];
      const content = `
        <div class="messages-wrap">
          <!-- Conversations list -->
          <div class="convos-list">
            <div class="convos-header">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <span style="font-weight:600;font-size:15px;">Messages</span>
                <span style="font-size:12px;color:var(--muted-foreground);">${conversations.length} conversation${conversations.length !== 1 ? 's' : ''}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--input-bg);">
                <i data-lucide="search" style="width:14px;height:14px;color:var(--muted-foreground);flex-shrink:0;"></i>
                <input type="text" placeholder="Search messages..." style="background:none;border:none;outline:none;font-size:13px;font-family:inherit;flex:1;color:var(--foreground);" />
              </div>
            </div>
            <div id="convosList">${renderConversations()}</div>
          </div>

          <!-- Chat area -->
          <div class="chat-area">
            <div class="chat-header-bar" id="chatHeader">
              <div style="width:38px;height:38px;border-radius:50%;background:${firstConvo.color};display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;">${firstConvo.avatar}</div>
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;" id="chatName">${firstConvo.name}</div>
                <div style="font-size:12px;color:#22c55e;">● Online · ${firstConvo.project}</div>
              </div>
              <a href="project-workroom.html?id=${firstConvo.taskId}" class="topnav-btn" title="Open Workroom" id="workroomLink">
                <i data-lucide="external-link" style="width:16px;height:16px;"></i>
              </a>
            </div>

            <div class="chat-body" id="chatBody">
              ${renderMessages(firstConvo)}
            </div>

            <div class="chat-footer">
              <button class="topnav-btn" title="Attach file"><i data-lucide="paperclip" style="width:16px;height:16px;"></i></button>
              <textarea class="chat-textarea" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
              <button style="width:40px;height:40px;border-radius:12px;background:#6366f1;color:white;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" id="sendBtn">
                <i data-lucide="send" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>
        </div>
      `;

      initDashboard({
        role: currentRole,
        activePath: 'messages.html',
        pageTitle: 'Messages',
        pageSubtitle: '',
        content
      });
      lucide.createIcons();

      // Send message from messages page
      document.getElementById('sendBtn')?.addEventListener('click', sendMsg);
      document.getElementById('chatInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
      document.getElementById('chatInput')?.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      const chatBody = document.getElementById('chatBody');
      if (chatBody) chatBody.scrollTop = chatBody.scrollHeight;
    });

    function selectConvo(idx) {
      activeConvoIdx = idx;
      const convo = conversations[idx];
      if (!convo) return;

      // Re-render list highlighting
      const list = document.getElementById('convosList');
      if (list) {
        list.querySelectorAll('.conversation-item').forEach((el, i) => {
          el.classList.toggle('active', i === idx);
        });
      }

      // Update chat header
      const header = document.getElementById('chatHeader');
      if (header) {
        header.innerHTML = `
          <div style="width:38px;height:38px;border-radius:50%;background:${convo.color};display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;">${convo.avatar}</div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:14px;">${convo.name}</div>
            <div style="font-size:12px;color:${convo.online ? '#22c55e' : 'var(--muted-foreground)'};">${convo.online ? '● Online' : '● Offline'} · ${convo.project}</div>
          </div>
          <a href="project-workroom.html?id=${convo.taskId}" class="topnav-btn" title="Open Workroom">
            <i data-lucide="external-link" style="width:16px;height:16px;"></i>
          </a>
        `;
      }

      // Render messages
      const body = document.getElementById('chatBody');
      if (body) {
        if (!convo.messages.length) {
          body.innerHTML = `<div class="empty-chat"><i data-lucide="message-square" style="width:36px;height:36px;margin-bottom:8px;opacity:0.3;"></i><div style="font-size:14px;">No messages yet</div><div style="font-size:12px;">Send a message from the <a href="project-workroom.html?id=${convo.taskId}" style="color:#6366f1;">project workroom</a>.</div></div>`;
        } else {
          body.innerHTML = convo.messages.map(m => `
            <div class="${m.from === 'me' ? 'msg-sent' : 'msg-received'}">
              ${m.from === 'them' ? `<div style="width:30px;height:30px;border-radius:50%;background:${convo.color};display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;flex-shrink:0;">${convo.avatar}</div>` : ''}
              <div>
                <div class="bubble ${m.from === 'me' ? 'bubble-sent' : 'bubble-received'}">${m.text}</div>
                <div class="msg-time">${m.time}</div>
              </div>
            </div>`).join('');
          body.scrollTop = body.scrollHeight;
        }
      }
      lucide.createIcons();
    }

    function sendMsg() {
      const input = document.getElementById('chatInput');
      const body = document.getElementById('chatBody');
      if (!input || !body) return;
      const text = input.value.trim();
      if (!text) return;

      const convo = conversations[activeConvoIdx];
      if (!convo) return;

      const session = (typeof Auth !== 'undefined') ? Auth.getCurrentUser() : null;
      const currentUserId = session?.userId || '';

      // Persist via Store (also generates notification)
      Store.sendMessage({
        taskId: convo.taskId,
        senderId: currentUserId,
        receiverId: convo.otherId,
        content: text,
        senderName: session?.name || '',
        senderAvatar: session?.avatar || '',
        senderAvatarColor: session?.avatarColor || '',
      });

      // Add to local conversation
      convo.messages.push({ from: 'me', text: text, time: 'Just now' });
      convo.lastMsg = text;
      convo.time = 'Just now';

      // Render the new message
      const msgEl = document.createElement('div');
      msgEl.className = 'msg-sent';
      msgEl.innerHTML = `<div><div class="bubble bubble-sent">${text}</div><div class="msg-time">Just now</div></div>`;
      body.appendChild(msgEl);
      input.value = '';
      input.style.height = 'auto';
      body.scrollTop = body.scrollHeight;
    }
  </script>
</head>
<body></body>
</html>
