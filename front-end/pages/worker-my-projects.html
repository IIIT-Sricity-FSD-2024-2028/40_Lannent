<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .project-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; transition:box-shadow 0.2s,transform 0.2s; }
    .project-card:hover { box-shadow:0 8px 32px rgba(0,0,0,0.08); transform:translateY(-2px); }
    .projects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
    .tab-bar { display:flex; gap:4px; background:var(--input-bg); padding:4px; border-radius:12px; margin-bottom:20px; width:fit-content; }
    .tab-btn { padding:7px 16px; border-radius:9px; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.15s,color 0.15s; border:none; background:transparent; color:var(--muted-foreground); font-family:inherit; }
    .tab-btn.active { background:var(--card); color:var(--foreground); box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .empty-state { text-align:center; padding:64px 32px; color:var(--muted-foreground); }
    .empty-state-icon { width:56px; height:56px; background:var(--secondary); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('worker')) return;
      const session = Auth.getCurrentUser();
      let activeTab = 'all';

      function fmtDate(d) {
        if (!d) return 'No deadline';
        try { return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}); } catch(e){ return d; }
      }
      function statusBadge(status) {
        const map = { 'open':['badge-gray','Open'], 'in-progress':['badge-blue','In Progress'], 'under-review':['badge-orange','Under Review'], 'completed':['badge-green','Completed'], 'disputed':['badge-red','Disputed'] };
        const [cls, label] = map[status] || ['badge-gray', status];
        return `<span class="badge ${cls}">${label}</span>`;
      }

      function getProjects() {
        const tasks = Store.getTasksByWorker(session.userId);
        return tasks.map(t => {
          const client = t.clientId ? Store.getUserById(t.clientId) : null;
          const milestones = Store.getMilestonesByTask(t.id);
          const doneList = milestones.filter(m => ['completed', 'approved', 'audit-passed', 'done', 'paid'].includes(m.status));
          const done = doneList.length;
          const earned = doneList.reduce((s,m) => s + (m.budget||0), 0);
          const calculatedProgress = milestones.length > 0 ? Math.round((done / milestones.length) * 100) : (t.progress || 0);
          return {
            id: t.id,
            name: t.title,
            client: client ? client.name : 'Unknown Client',
            clientAvatar: client ? client.avatar : '?',
            clientColor: client ? client.avatarColor : '#e5e7eb',
            progress: calculatedProgress,
            status: t.status,
            milestones: `${done}/${milestones.length}`,
            earned: `$${earned.toLocaleString()}`,
            total: `$${(t.budget||0).toLocaleString()}`,
            deadline: fmtDate(t.deadline),
            category: t.status === 'completed' ? 'completed' : 'active'
          };
        });
      }

      function renderProjects(cat) {
        const all = getProjects();
        const list = cat === 'all' ? all : all.filter(p => p.category === cat);
        if (!list.length) return `
          <div class="empty-state">
            <div class="empty-state-icon"><i data-lucide="folder-open" style="width:24px;height:24px;color:var(--muted-foreground);"></i></div>
            <div style="font-size:16px;font-weight:600;margin-bottom:6px;">No projects here</div>
            <div style="font-size:14px;margin-bottom:20px;">Browse tasks and apply to start earning.</div>
            <a href="browse-tasks.html" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;">
              <i data-lucide="search" style="width:16px;height:16px;"></i> Find Tasks
            </a>
          </div>`;
        return `<div class="projects-grid">${list.map(p => `
          <div class="project-card" style="display:flex;flex-direction:column;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
              <h3 style="font-size:16px;font-weight:600;letter-spacing:-0.01em;flex:1;margin-right:12px;">${p.name}</h3>
              ${statusBadge(p.status)}
            </div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
              <div style="width:32px;height:32px;border-radius:50%;background:${p.clientColor};display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">${p.clientAvatar}</div>
              <span style="font-size:13px;color:var(--foreground);">Client: ${p.client}</span>
            </div>
            <div style="margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <span style="font-size:12px;color:var(--muted-foreground);">Milestone Progress</span>
                <span style="font-size:12px;font-weight:700;color:var(--foreground);">${p.milestones} completed</span>
              </div>
              <div style="height:6px;border-radius:9999px;background:var(--muted);overflow:hidden;">
                <div style="height:100%;border-radius:9999px;background:linear-gradient(90deg,#10b981,#059669);width:${p.progress}%;transition:width 0.4s;"></div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;flex:1;">
              <div style="background:#f0fdf4;border:1px solid #dcfce7;border-radius:12px;padding:12px;">
                <div style="font-size:11px;color:#16a34a;margin-bottom:4px;display:flex;align-items:center;gap:4px;">
                  <i data-lucide="wallet" style="width:13px;height:13px;"></i>Earned
                </div>
                <div style="font-size:15px;font-weight:700;color:#16a34a;">${p.earned} <span style="font-size:11px;color:#22c55e;">/ ${p.total}</span></div>
              </div>
              <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:12px;">
                <div style="font-size:11px;color:var(--muted-foreground);margin-bottom:4px;">
                  <i data-lucide="calendar" style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:4px;"></i>Deadline
                </div>
                <div style="font-size:13px;font-weight:600;color:var(--foreground);">${p.deadline}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <button onclick="window.location.href='worker-milestone-board.html?id=${p.id}'" style="padding:10px;border:1px solid var(--border);border-radius:10px;background:white;color:var(--foreground);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
                <i data-lucide="layout-list" style="width:14px;height:14px;"></i>Milestones
              </button>
              <button onclick="window.location.href='worker-workroom.html?id=${p.id}'" style="padding:10px;border:1px solid var(--border);border-radius:10px;background:white;color:var(--foreground);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
                <i data-lucide="message-circle" style="width:14px;height:14px;"></i>Workroom
              </button>
            </div>
          </div>`).join('')}</div>`;
      }

      function buildContent() {
        const all = getProjects();
        const active = all.filter(p=>p.category==='active').length;
        const completed = all.filter(p=>p.category==='completed').length;
        return `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <div class="tab-bar">
              <button class="tab-btn active" onclick="switchTab('all',this)">All (${all.length})</button>
              <button class="tab-btn" onclick="switchTab('active',this)">Active (${active})</button>
              <button class="tab-btn" onclick="switchTab('completed',this)">Completed (${completed})</button>
            </div>
            <a href="browse-tasks.html" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;">
              <i data-lucide="search" style="width:16px;height:16px;"></i> Find More Tasks
            </a>
          </div>
          <div id="projectsContainer">${renderProjects('all')}</div>`;
      }

      initDashboard({ role:'worker', activePath:'worker-my-projects.html', pageTitle:'My Projects', pageSubtitle:'Track your active projects and earnings', content: buildContent() });
      lucide.createIcons();

      window.switchTab = function(cat, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = cat;
        const c = document.getElementById('projectsContainer');
        if (c) { c.innerHTML = renderProjects(cat); lucide.createIcons(); }
      };
    });
  </script>
</head>
<body></body>
</html>
