<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Lannent Expert</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    /* ── Outer wrapper: full height below topbar ── */
    .messages-wrap {
      display: flex;
      height: calc(100vh - 64px - 48px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       LEFT PANEL — conversation list
    ══════════════════════════════════════ */
    .convos-panel {
      width: 300px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--card);
    }
    .convos-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .convos-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .convos-title { font-size: 15px; font-weight: 700; }
    .convos-unread {
      font-size: 11px;
      color: var(--muted-foreground);
      background: var(--secondary);
      padding: 2px 8px;
      border-radius: 9999px;
    }
    .convos-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .convos-search input {
      background: none;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      flex: 1;
      color: var(--foreground);
    }
    .convos-search input::placeholder { color: var(--muted-foreground); }

    /* Filter tabs */
    .convos-tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 5px 0;
      border-radius: 8px;
      border: none;
      background: none;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: var(--foreground);
      color: var(--primary-foreground);
    }
    .tab-btn:not(.active):hover {
      background: var(--secondary);
      color: var(--foreground);
    }

    /* Conversation items */
    .convos-list { flex: 1; overflow-y: auto; }

    .convo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background 0.15s;
      position: relative;
    }
    .convo-item:hover { background: var(--secondary); }
    .convo-item.active { background: rgba(99,102,241,0.06); border-left: 3px solid #6366f1; padding-left: 13px; }

    .convo-avatar-wrap { position: relative; flex-shrink: 0; }
    .convo-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 700;
    }
    .convo-online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid white;
    }

    .convo-info { flex: 1; min-width: 0; }
    .convo-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .convo-name { font-size: 13px; font-weight: 600; }
    .convo-time { font-size: 11px; color: var(--muted-foreground); flex-shrink: 0; }
    .convo-last-msg {
      font-size: 12px;
      color: var(--muted-foreground);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }
    .convo-last-msg.unread { color: var(--foreground); font-weight: 500; }
    .convo-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .tag-case    { background: #ede9fe; color: #7c3aed; }
    .tag-client  { background: #dbeafe; color: #1d4ed8; }
    .tag-worker  { background: #d1fae5; color: #065f46; }
    .tag-admin   { background: #f3f4f6; color: #374151; }

    .unread-badge {
      min-width: 18px; height: 18px;
      border-radius: 9999px;
      background: #6366f1;
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       RIGHT PANEL — chat area
    ══════════════════════════════════════ */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Chat header */
    .chat-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--card);
    }
    .chat-header-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .chat-header-name { font-size: 14px; font-weight: 700; }
    .chat-header-meta { font-size: 12px; color: var(--muted-foreground); margin-top: 1px; }
    .chat-header-online { color: #22c55e; }

    /* Case context pill */
    .case-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .case-pill:hover { background: var(--secondary); color: var(--foreground); }

    /* Icon button */
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted-foreground);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--secondary); color: var(--foreground); }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted-foreground);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 4px 0;
    }
    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* System message */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--muted-foreground);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 4px 14px;
      align-self: center;
      max-width: 80%;
    }

    /* Chat body */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Message bubbles */
    .msg-sent     { display: flex; justify-content: flex-end; }
    .msg-received { display: flex; justify-content: flex-start; gap: 8px; align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      max-width: 68%;
    }
    .bubble-sent {
      background: #6366f1;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble-received {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--foreground);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 11px;
      color: var(--muted-foreground);
      margin-top: 4px;
      text-align: right;
    }
    .msg-received .msg-time { text-align: left; }

    /* Attachment bubble */
    .attachment-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      max-width: 260px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .attachment-bubble:hover { background: var(--secondary); }
    .attachment-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .attachment-name { font-size: 13px; font-weight: 500; }
    .attachment-size { font-size: 11px; color: var(--muted-foreground); }

    /* Chat footer */
    .chat-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      background: var(--card);
    }
    .chat-textarea {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      background: var(--input-bg);
      line-height: 1.5;
      transition: box-shadow 0.15s;
    }
    .chat-textarea:focus { box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    .chat-textarea::placeholder { color: var(--muted-foreground); }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: #6366f1;
      color: white;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover  { background: #4f46e5; }
    .send-btn:active { transform: scale(0.95); }

    /* Empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted-foreground);
      gap: 10px;
    }
    .chat-empty-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }

    @media (max-width: 700px) {
      .convos-panel { display: none; }
    }
  </style>

  <script>
    /* ─────────────────────────────────────
       Conversation data for Expert Reviewer
    ───────────────────────────────────── */
    const conversations = [
      {
        id: 1,
        name: 'James Client',
        avatar: 'JC',
        color: 'linear-gradient(135deg,#ef4444,#dc2626)',
        role: 'Client',
        tag: 'client',

        caseId: 'AUD-2026-001',
        lastMsg: 'Thank you for the thorough report, much appreciated.',

        messages: [
          { from: 'them', text: 'Hi Dr. Smith, I wanted to flag some concerns about the Frontend Development milestone before your review.', time: '9:10 AM' },
          { from: 'me', text: 'Of course, go ahead. I\'m currently reviewing the submitted files.', time: '9:14 AM' },
          { from: 'them', text: 'Specifically, the checkout flow doesn\'t match the design specs we agreed on. The button placement is different.', time: '9:16 AM' },
          { from: 'me', text: 'I\'ve noted that. I\'ll compare the submitted Figma files against the original brief and include my findings in the report.', time: '9:20 AM' },
          { from: 'them', text: 'There are also some performance concerns — the product grid is very slow on mobile.', time: '9:21 AM' },
          { from: 'me', text: 'Understood. Performance assessment is included in my audit scope. I\'ll run a Lighthouse check on the provided prototype.', time: '9:24 AM' },
          { from: 'them', text: 'Thank you for the thorough report, much appreciated.', time: '9:50 AM' },
        ],
      },
      {
        id: 2,
        name: 'Sarah Chen',
        avatar: 'SC',
        color: 'linear-gradient(135deg,#6366f1,#4f46e5)',
        role: 'Gig Worker',
        tag: 'worker',
        tagLabel: 'Worker',
        caseRef: 'E-commerce Platform Redesign',
        caseId: 'AUD-2026-001',
        lastMsg: 'I\'ll send the updated accessibility fixes by tonight.',
        time: '32m ago',
        unread: 1,
        online: true,
        messages: [
          { from: 'them', text: 'Hello Dr. Smith! I saw the audit report was published. I wanted to clarify something about the ARIA labels finding.', time: '10:05 AM' },
          { from: 'me', text: 'Hi Sarah, sure — what would you like to clarify?', time: '10:08 AM' },
          { from: 'them', text: 'The carousel buttons do have aria-labels in the component file — they might not have been picked up because the build step strips comments. Can I share the source?', time: '10:10 AM' },
          { from: 'me', text: 'Yes please share the source file. If the labels are present in the production build, I can issue an amended finding.', time: '10:13 AM' },
          { from: 'them', text: 'Here\'s the component file:', time: '10:14 AM', attachment: { name: 'ProductCarousel.tsx', size: '12 KB', icon: 'file-code', iconColor: '#6366f1', iconBg: '#eef2ff' } },
          { from: 'me', text: 'Reviewed — you\'re right, the labels are in the source. The issue is that the Storybook preview I was given doesn\'t reflect the production build. I\'ll update the finding to a suggestion.', time: '10:22 AM' },
          { from: 'them', text: 'I\'ll send the updated accessibility fixes by tonight.', time: '10:25 AM' },
        ],
      },
      {
        id: 3,
        name: 'TechCorp Inc.',
        avatar: 'TC',
        color: 'linear-gradient(135deg,#f59e0b,#d97706)',
        role: 'Client',
        tag: 'client',
        tagLabel: 'Client',
        caseRef: 'E-learning Platform · Dispute',
        caseId: 'DSP-2026-002',
        lastMsg: 'We\'ll wait for the resubmission then.',
        time: '2h ago',
        unread: 0,
        online: false,
        messages: [
          { from: 'them', text: 'Dr. Smith, has the expert review started on our dispute case yet? Case DSP-2026-002.', time: 'Yesterday, 3:00 PM' },
          { from: 'me', text: 'Yes, I\'ve been assigned to your case and have reviewed all submitted files and load test reports.', time: 'Yesterday, 3:15 PM' },
          { from: 'them', text: 'The performance results are clear — 2,340ms is far above the 500ms threshold we agreed on.', time: 'Yesterday, 3:18 PM' },
          { from: 'me', text: 'The contract clause is clear on that point. However, the worker has raised a valid counter-point about cold-start conditions and the Redis caching layer not being deployed in the test environment.', time: 'Yesterday, 3:25 PM' },
          { from: 'them', text: 'We ran the tests exactly as the architecture doc specified.', time: 'Yesterday, 3:27 PM' },
          { from: 'me', text: 'I\'ve issued a Request Fix verdict — the worker has 5 business days to demonstrate compliant performance or optimise without the cache dependency. The verdict is neutral and gives both parties a fair path forward.', time: 'Yesterday, 4:00 PM' },
          { from: 'them', text: 'We\'ll wait for the resubmission then.', time: 'Yesterday, 4:05 PM' },
        ],
      },
      {
        id: 4,
        name: 'Arjun Mehta',
        avatar: 'AM',
        color: 'linear-gradient(135deg,#10b981,#059669)',
        role: 'Gig Worker',
        tag: 'worker',
        tagLabel: 'Worker',
        caseRef: 'E-learning Platform · Dispute',
        caseId: 'DSP-2026-002',
        lastMsg: 'I\'ll have the optimised API ready by Mar 9.',
        time: '4h ago',
        unread: 0,
        online: false,
        messages: [
          { from: 'them', text: 'Hi Dr. Smith, I wanted to explain the Redis caching setup — it\'s a required part of the architecture and the client didn\'t configure it before running load tests.', time: 'Yesterday, 1:00 PM' },
          { from: 'me', text: 'I saw your counter-claim and the local benchmark results. Can you share the architecture document that specifies the Redis requirement?', time: 'Yesterday, 1:10 PM' },
          { from: 'them', text: 'Yes, here it is:', time: 'Yesterday, 1:12 PM', attachment: { name: 'architecture-spec.pdf', size: '760 KB', icon: 'file-text', iconColor: '#ef4444', iconBg: '#fee2e2' } },
          { from: 'me', text: 'Reviewed. The spec does mention Redis as part of the recommended deployment stack. However, since I can\'t independently verify the test environment configuration, I\'m issuing a Request Fix — please provide evidence under properly configured conditions or optimise the API to meet the benchmark without the caching dependency.', time: 'Yesterday, 2:45 PM' },
          { from: 'them', text: 'That\'s fair. I\'ll optimise the query layer so it meets the SLA without Redis as a dependency.', time: 'Yesterday, 2:50 PM' },
          { from: 'me', text: 'Good. You have until Mar 11. Please resubmit through the platform and message me once done.', time: 'Yesterday, 2:52 PM' },
          { from: 'them', text: 'I\'ll have the optimised API ready by Mar 9.', time: 'Yesterday, 2:55 PM' },
        ],
      },
      {
        id: 5,
        name: 'Lannent Support',
        avatar: 'LS',
        color: 'linear-gradient(135deg,#64748b,#475569)',
        role: 'Platform',
        tag: 'admin',
        tagLabel: 'Admin',
        caseRef: 'Platform Notifications',
        caseId: null,
        lastMsg: 'You have 3 new audit requests assigned to your queue.',
        time: 'Mar 6',
        unread: 0,
        online: true,
        messages: [
          { from: 'them', text: 'Welcome back Dr. Smith! You have 3 new audit requests assigned to your queue for this week.', time: 'Mar 6, 9:00 AM', isSystem: true },
          { from: 'them', text: 'Audit AUD-2026-001 (E-commerce Platform Redesign) is marked High Priority — client deadline is Mar 8.', time: 'Mar 6, 9:01 AM', isSystem: true },
          { from: 'them', text: 'Dispute DSP-2026-002 (E-learning Platform) has been escalated. Both parties have submitted their evidence.', time: 'Mar 6, 9:02 AM', isSystem: true },
          { from: 'me', text: 'Acknowledged. I\'ll start with AUD-2026-001 today.', time: 'Mar 6, 9:10 AM' },
          { from: 'them', text: 'Your monthly payout of $4,200 has been processed and will appear in your wallet within 1–2 business days.', time: 'Mar 6, 2:00 PM', isSystem: true },
          { from: 'them', text: 'You have 3 new audit requests assigned to your queue.', time: 'Mar 7, 9:00 AM', isSystem: true },
        ],
      },
    ];

    let activeConvoId = 1;
    let activeFilter  = 'all';

    /* ─────────────────────────────────
       Helpers
    ───────────────────────────────── */
    function totalUnread() {
      return conversations.reduce((a, c) => a + c.unread, 0);
    }

    function filteredConvos() {
      if (activeFilter === 'all') return conversations;
      return conversations.filter(c => c.tag === activeFilter);
    }

    function tagClass(tag) {
      return { client: 'tag-client', worker: 'tag-worker', admin: 'tag-admin', case: 'tag-case' }[tag] || 'tag-admin';
    }

    /* ─────────────────────────────────
       Render conversation list
    ───────────────────────────────── */
    function renderConvosList() {
      const list = filteredConvos();
      if (!list.length) {
        return `<div style="padding:32px 16px;text-align:center;color:var(--muted-foreground);font-size:13px;">No conversations found.</div>`;
      }
      return list.map(c => `
        <div class="convo-item${c.id === activeConvoId ? ' active' : ''}" onclick="selectConvo(${c.id})">
          <div class="convo-avatar-wrap">
            <div class="convo-avatar" style="background:${c.color};">${c.avatar}</div>
            ${c.online ? '<div class="convo-online-dot"></div>' : ''}
          </div>
          <div class="convo-info">
            <div class="convo-name-row">
              <span class="convo-name">${c.name}</span>
              <span class="convo-time">${c.time}</span>
            </div>
            <div class="convo-last-msg${c.unread ? ' unread' : ''}">${c.lastMsg}</div>
            <span class="convo-tag ${tagClass(c.tag)}">
              ${c.tag === 'client' ? '<i data-lucide="building-2" style="width:9px;height:9px;"></i>' : c.tag === 'worker' ? '<i data-lucide="user" style="width:9px;height:9px;"></i>' : '<i data-lucide="shield" style="width:9px;height:9px;"></i>'}
              ${c.tagLabel}
              ${c.caseId ? ` · ${c.caseId}` : ''}
            </span>
          </div>
          ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
        </div>
      `).join('');
    }

    /* ─────────────────────────────────
       Render messages
    ───────────────────────────────── */
    function renderMessages(convo) {
      let lastDate = '';
      let html = '';

      convo.messages.forEach(m => {
        // Date divider
        const datePart = m.time.includes(',') ? m.time.split(',')[0] : (m.time.includes('AM') || m.time.includes('PM') ? 'Today' : m.time);
        if (datePart !== lastDate) {
          html += `<div class="date-divider">${datePart}</div>`;
          lastDate = datePart;
        }

        // System message
        if (m.isSystem) {
          html += `<div class="sys-msg">${m.text}</div>`;
          return;
        }

        if (m.from === 'me') {
          html += `
            <div class="msg-sent">
              <div>
                ${m.attachment ? `
                  <div class="attachment-bubble" style="margin-bottom:4px;">
                    <div class="attachment-icon" style="background:${m.attachment.iconBg};">
                      <i data-lucide="${m.attachment.icon}" style="width:16px;height:16px;color:${m.attachment.iconColor};"></i>
                    </div>
                    <div>
                      <div class="attachment-name">${m.attachment.name}</div>
                      <div class="attachment-size">${m.attachment.size}</div>
                    </div>
                    <i data-lucide="download" style="width:13px;height:13px;color:var(--muted-foreground);margin-left:auto;"></i>
                  </div>` : ''}
                ${m.text ? `<div class="bubble bubble-sent">${m.text}</div>` : ''}
                <div class="msg-time">${m.time.includes(',') ? m.time.split(', ')[1] : m.time} · Sent</div>
              </div>
            </div>`;
        } else {
          html += `
            <div class="msg-received">
              <div class="convo-avatar" style="width:28px;height:28px;border-radius:50%;background:${convo.color};font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;">${convo.avatar}</div>
              <div>
                ${m.attachment ? `
                  <div class="attachment-bubble" style="margin-bottom:4px;background:var(--input-bg);">
                    <div class="attachment-icon" style="background:${m.attachment.iconBg};">
                      <i data-lucide="${m.attachment.icon}" style="width:16px;height:16px;color:${m.attachment.iconColor};"></i>
                    </div>
                    <div>
                      <div class="attachment-name">${m.attachment.name}</div>
                      <div class="attachment-size">${m.attachment.size}</div>
                    </div>
                    <i data-lucide="download" style="width:13px;height:13px;color:var(--muted-foreground);margin-left:auto;"></i>
                  </div>` : ''}
                ${m.text ? `<div class="bubble bubble-received">${m.text}</div>` : ''}
                <div class="msg-time">${m.time.includes(',') ? m.time.split(', ')[1] : m.time}</div>
              </div>
            </div>`;
        }
      });
      return html;
    }

    /* ─────────────────────────────────
       Select conversation
    ───────────────────────────────── */
    function selectConvo(id) {
      activeConvoId = id;
      const convo = conversations.find(c => c.id === id);
      if (!convo) return;
      convo.unread = 0; // mark as read

      // Re-render list
      const listEl = document.getElementById('convosList');
      if (listEl) { listEl.innerHTML = renderConvosList(); lucide.createIcons(); }

      // Update header
      const headerEl = document.getElementById('chatHeader');
      if (headerEl) {
        headerEl.innerHTML = `
          <div class="chat-header-avatar" style="background:${convo.color};">${convo.avatar}</div>
          <div style="flex:1;min-width:0;">
            <div class="chat-header-name">${convo.name}</div>
            <div class="chat-header-meta">
              <span class="${convo.online ? 'chat-header-online' : ''}">${convo.online ? '● Online' : '● Offline'}</span>
              · ${convo.role}
            </div>
          </div>
          ${convo.caseId ? `
            <div class="case-pill" onclick="void(0)">
              <i data-lucide="briefcase" style="width:11px;height:11px;"></i>
              ${convo.caseId}
            </div>` : ''}
          <button class="icon-btn" title="Search in conversation"><i data-lucide="search" style="width:15px;height:15px;"></i></button>
          <button class="icon-btn" title="More options"><i data-lucide="more-horizontal" style="width:15px;height:15px;"></i></button>
        `;
        lucide.createIcons();
      }

      // Render messages
      const bodyEl = document.getElementById('chatBody');
      if (bodyEl) {
        bodyEl.innerHTML = renderMessages(convo);
        lucide.createIcons();
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }
    }

    /* ─────────────────────────────────
       Send message
    ───────────────────────────────── */
    function sendMsg() {
      const input  = document.getElementById('chatInput');
      const bodyEl = document.getElementById('chatBody');
      if (!input || !bodyEl) return;
      const text = input.value.trim();
      if (!text) return;

      const convo = conversations.find(c => c.id === activeConvoId);
      if (convo) convo.messages.push({ from: 'me', text, time: 'Just now' });

      const msgEl = document.createElement('div');
      msgEl.className = 'msg-sent';
      msgEl.innerHTML = `
        <div>
          <div class="bubble bubble-sent">${text}</div>
          <div class="msg-time">Just now · Sent</div>
        </div>`;
      bodyEl.appendChild(msgEl);
      input.value = '';
      input.style.height = 'auto';
      bodyEl.scrollTop = bodyEl.scrollHeight;

      // Update last message in list
      if (convo) {
        convo.lastMsg = text;
        convo.time = 'Just now';
        const listEl = document.getElementById('convosList');
        if (listEl) { listEl.innerHTML = renderConvosList(); lucide.createIcons(); }
      }
    }

    /* ─────────────────────────────────
       Filter tabs
    ───────────────────────────────── */
    function setFilter(val, btn) {
      activeFilter = val;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const listEl = document.getElementById('convosList');
      if (listEl) { listEl.innerHTML = renderConvosList(); lucide.createIcons(); }
    }

    /* ─────────────────────────────────
       Init
    ───────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('expert')) return;
      const activeConvo = conversations.find(c => c.id === activeConvoId);

      const content = `
        <div class="messages-wrap">

          <!-- ══ LEFT: Conversations Panel ══ -->
          <div class="convos-panel">
            <div class="convos-header">
              <div class="convos-header-top">
                <span class="convos-title">Messages</span>
                <span class="convos-unread">${totalUnread()} unread</span>
              </div>
              <div class="convos-search">
                <i data-lucide="search" style="width:14px;height:14px;color:var(--muted-foreground);flex-shrink:0;"></i>
                <input type="text" placeholder="Search conversations..." oninput="filterSearch(this.value)" />
              </div>
              <div class="convos-tabs">
                <button class="tab-btn active" onclick="setFilter('all',this)">All</button>
                <button class="tab-btn" onclick="setFilter('client',this)">Clients</button>
                <button class="tab-btn" onclick="setFilter('worker',this)">Workers</button>
              </div>
            </div>
            <div class="convos-list" id="convosList">
              ${renderConvosList()}
            </div>
          </div>

          <!-- ══ RIGHT: Chat Area ══ -->
          <div class="chat-area">

            <!-- Header -->
            <div class="chat-header" id="chatHeader">
              <div class="chat-header-avatar" style="background:${activeConvo.color};">${activeConvo.avatar}</div>
              <div style="flex:1;min-width:0;">
                <div class="chat-header-name">${activeConvo.name}</div>
                <div class="chat-header-meta">
                  <span class="${activeConvo.online ? 'chat-header-online' : ''}">${activeConvo.online ? '● Online' : '● Offline'}</span>
                  · ${activeConvo.role}
                </div>
              </div>
              ${activeConvo.caseId ? `
                <div class="case-pill">
                  <i data-lucide="briefcase" style="width:11px;height:11px;"></i>
                  ${activeConvo.caseId}
                </div>` : ''}
              <button class="icon-btn" title="Search in conversation"><i data-lucide="search" style="width:15px;height:15px;"></i></button>
              <button class="icon-btn" title="More options"><i data-lucide="more-horizontal" style="width:15px;height:15px;"></i></button>
            </div>

            <!-- Messages -->
            <div class="chat-body" id="chatBody">
              ${renderMessages(activeConvo)}
            </div>

            <!-- Footer -->
            <div class="chat-footer">
              <button class="icon-btn" title="Attach file"><i data-lucide="paperclip" style="width:15px;height:15px;"></i></button>
              <textarea
                class="chat-textarea"
                id="chatInput"
                placeholder="Type a message…"
                rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
                oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"
              ></textarea>
              <button class="send-btn" onclick="sendMsg()" title="Send">
                <i data-lucide="send" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>

        </div>
      `;

      initDashboard({
        role: 'expert',
        activePath: 'expert-messages.html',
        pageTitle: 'Messages',
        pageSubtitle: '',
        content,
      });

      lucide.createIcons();

      // Scroll to bottom on load
      setTimeout(() => {
        const body = document.getElementById('chatBody');
        if (body) body.scrollTop = body.scrollHeight;
      }, 50);
    });

    /* Search filter (client-side) */
    function filterSearch(query) {
      const q = query.toLowerCase();
      const listEl = document.getElementById('convosList');
      if (!listEl) return;
      const filtered = filteredConvos().filter(c =>
        !q || c.name.toLowerCase().includes(q) || c.caseRef.toLowerCase().includes(q) || c.lastMsg.toLowerCase().includes(q)
      );
      listEl.innerHTML = filtered.map(c => `
        <div class="convo-item${c.id === activeConvoId ? ' active' : ''}" onclick="selectConvo(${c.id})">
          <div class="convo-avatar-wrap">
            <div class="convo-avatar" style="background:${c.color};">${c.avatar}</div>
            ${c.online ? '<div class="convo-online-dot"></div>' : ''}
          </div>
          <div class="convo-info">
            <div class="convo-name-row">
              <span class="convo-name">${c.name}</span>
              <span class="convo-time">${c.time}</span>
            </div>
            <div class="convo-last-msg${c.unread ? ' unread' : ''}">${c.lastMsg}</div>
            <span class="convo-tag ${tagClass(c.tag)}">${c.tagLabel}${c.caseId ? ` · ${c.caseId}` : ''}</span>
          </div>
          ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
        </div>
      `).join('') || `<div style="padding:32px 16px;text-align:center;color:var(--muted-foreground);font-size:13px;">No results for "${query}"</div>`;
      lucide.createIcons();
    }
  </script>
</head>
<body></body>
</html>
