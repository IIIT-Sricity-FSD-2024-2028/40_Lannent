<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post New Task — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    .post-container { display:grid; grid-template-columns:1fr 320px; gap:18px; width:100%; max-width:none; margin:0; align-items:start; }
    .section-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 20px 24px; margin-bottom:20px; box-shadow:0 8px 30px rgba(0,0,0,0.06); }
    .post-sidebar { position:sticky; top:20px; }
    .section-card h2 { font-size:17px; font-weight:500; letter-spacing:-0.02em; margin-bottom:16px; }
    .form-group { margin-bottom:16px; }
    .form-group:last-child { margin-bottom:0; }
    .form-label { display:block; font-size:14px; font-weight:500; margin-bottom:8px; }
    .form-label .required { color:#ef4444; }
    .form-input, .form-select, .form-textarea { width:100%; padding:10px 16px; border:1px solid var(--border); border-radius:12px; background:var(--background); font-size:14px; font-family:inherit; outline:none; transition:box-shadow 0.2s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { box-shadow:0 0 0 2px var(--ring); }
    .form-textarea { resize:none; padding:12px 16px; }
    .grid-3 { display:grid; grid-template-columns:2fr 2fr 1fr; gap:12px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .budget-escrow { font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .budget-escrow .form-label { font-weight:600; margin-bottom:6px; }
    .budget-escrow .form-input, .budget-escrow .form-select { border-color: #d1d5db; border-width:2px; border-radius:14px; font-size:16px; min-height:52px; }
    .budget-escrow .form-input.with-icon { padding-left:48px; }
    .budget-escrow .input-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#6b7280; font-size:18px; width:auto; height:auto; pointer-events:none; }
    .budget-escrow .form-group { position:relative; }
    .budget-escrow .grid-2 { grid-template-columns:2fr 1fr; }
    .budget-escrow .form-input:focus, .budget-escrow .form-select:focus { outline:none; box-shadow:0 0 0 3px rgba(59,130,246,0.16); border-color:#2563eb; }
    .form-input.with-icon { padding-left:44px; position:relative; }
    .input-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted-foreground); pointer-events:none; width:18px; height:18px; }
    .skills-container { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .skill-tag { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:9999px; background:#eff6ff; border:1px solid #bfdbfe; color:#0369a1; font-size:12px; font-weight:500; }
    .skill-tag button { background:none; border:none; cursor:pointer; padding:0; color:inherit; }
    .skill-tag button:hover { color:#1e40af; }
    .suggestion-dropdown { position:absolute; top:100%; left:0; right:0; margin-top:8px; border:1px solid var(--border); border-radius:12px; background:var(--card); box-shadow:0px 10px 40px 5px rgba(194,194,194,0.25); max-height:200px; overflow-y:auto; z-index:10; display:none; }
    .suggestion-dropdown.active { display:block; }
    .suggestion-item { padding:10px 16px; font-size:14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
    .suggestion-item:last-child { border-bottom:none; }
    .suggestion-item:hover { background:var(--secondary)/60; }
    .suggestion-item:first-child { border-radius:12px 12px 0 0; }
    .suggestion-item:last-child { border-radius:0 0 12px 12px; }
    .audit-toggle { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:16px; border:1px solid var(--border); background:var(--secondary)/30; border-radius:12px; }
    .audit-info { flex:1; }
    .audit-label { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:14px; font-weight:500; }
    .audit-label svg { color:#a855f7; }
    .audit-desc { font-size:12px; color:var(--muted-foreground); line-height:1.4; }
    .toggle-switch { width:48px; height:24px; border-radius:9999px; transition:background 0.2s; cursor:pointer; position:relative; border:none; padding:0; }
    .toggle-switch.off { background:#d1d5db; }
    .toggle-switch.on { background:#22c55e; }
    .toggle-switch-thumb { position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:9999px; background:white; transition:transform 0.2s; }
    .toggle-switch.on .toggle-switch-thumb { transform:translateX(24px); }
    .milestone-list { display:flex; flex-direction:column; gap:12px; }
    .milestone-card { padding:16px; border:1px solid var(--border); border-radius:12px; background:var(--background); display:flex; align-items:flex-start; justify-content:space-between; gap:12px; transition:background 0.2s; }
    .milestone-card:hover { background:var(--secondary)/20; }
    .milestone-content { flex:1; }
    .milestone-index { display:flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:#dbeafe; color:#0369a1; font-size:12px; font-weight:600; flex-shrink:0; }
    .milestone-title { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .milestone-title h3 { font-size:14px; font-weight:500; margin:0; }
    .milestone-desc { font-size:12px; color:var(--muted-foreground); margin-left:32px; margin-bottom:8px; }
    .milestone-budget { display:flex; align-items:center; gap:8px; margin-left:32px; font-size:14px; font-weight:500; color:#16a34a; }
    .milestone-budget svg { color:#16a34a; width:14px; height:14px; }
    .milestone-delete { background:none; border:none; color:var(--muted-foreground); cursor:pointer; padding:4px; transition:color 0.2s; }
    .milestone-delete:hover { color:#dc2626; }
    .milestone-form { padding:16px; border:1px solid var(--border); background:var(--secondary)/30; border-radius:12px; margin-bottom:16px; }
    .milestone-form-actions { display:flex; gap:8px; margin-top:12px; }
    .milestone-form-actions button { flex:1; padding:8px 16px; border-radius:10px; border:none; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.2s; }
    .milestone-form-actions .save { background:#22c55e; color:white; }
    .milestone-form-actions .save:hover { background:#16a34a; }
    .milestone-form-actions .cancel { border:1px solid var(--border); background:var(--background); }
    .milestone-form-actions .cancel:hover { background:var(--secondary)/60; }
    .empty-state { text-align:center; padding:32px 16px; }
    .empty-state svg { width:40px; height:40px; color:var(--muted-foreground); margin:0 auto 12px; }
    .empty-state p { font-size:14px; color:var(--muted-foreground); }
    .budget-check { padding:16px; border-radius:12px; margin-bottom:16px; font-size:14px; }
    .budget-check.ok { background:#dbeafe; border:1px solid #bfdbfe; color:#0369a1; }
    .budget-check.exceeded { background:#fee2e2; border:1px solid #fecaca; color:#991b1b; }
    .budget-check-item { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .budget-check-item:last-of-type { margin-bottom:0; }
    .budget-check-divider { padding-top:8px; border-top:1px solid; }
    .budget-check-warning { display:flex; align-items:flex-start; gap:8px; margin-top:12px; }
    .budget-check-warning svg { width:16px; height:16px; flex-shrink:0; margin-top:2px; }
    .budget-check-warning p { font-size:12px; margin:0; }
    .add-milestone-btn { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:12px; background:#eff6ff; border:1px solid #bfdbfe; color:#0369a1; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.2s; }
    .add-milestone-btn:hover { background:#dbeafe; }
    .action-buttons { display:flex; gap:12px; }
    .action-buttons button { flex:1; height:48px; border-radius:12px; border:none; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
    .save-draft { border:1px solid var(--border); background:var(--card); color:var(--foreground); }
    .save-draft:hover { background:var(--secondary)/60; }
    .publish { border-radius:32px; background:linear-gradient(to bottom, hsl(0,0%,16%), hsl(0,0%,10%)); color:#ffffff; box-shadow:inset -4px -6px 25px 0px rgba(201,201,201,0.08), inset 4px 4px 10px 0px rgba(29,29,29,0.24); }
    .publish:hover { transform:scale(1.02); }
    .publish:active { transform:scale(0.98); }
    .post-sidebar { position:sticky; top:24px; }
    .sidebar-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:0px 10px 40px 5px rgba(194,194,194,0.12); }
    .sidebar-card h3 { font-size:17px; font-weight:500; letter-spacing:-0.02em; margin-bottom:16px; }
    .summary-item { padding:16px; border-radius:12px; margin-bottom:16px; }
    .summary-item:last-child { margin-bottom:0; }
    .summary-item.budget { background:#f0fdf4; border:1px solid #bbf7d0; }
    .summary-item.milestones { background:#eff6ff; border:1px solid #bfdbfe; }
    .summary-item.deadline { background:#faf5ff; border:1px solid #e9d5ff; }
    .summary-item.audit { background:#f3f4f6; border:1px solid #d1d5db; }
    .summary-item.audit.enabled { background:#fff7ed; border:1px solid #fed7aa; }
    .summary-label { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:12px; font-weight:500; }
    .summary-label.budget { color:#16a34a; }
    .summary-label.budget svg { color:#16a34a; }
    .summary-label.milestones { color:#0369a1; }
    .summary-label.milestones svg { color:#0369a1; }
    .summary-label.deadline { color:#7c3aed; }
    .summary-label.deadline svg { color:#7c3aed; }
    .summary-label.audit { color:#4b5563; }
    .summary-label.audit svg { color:#4b5563; }
    .summary-label.audit.enabled { color:#c2410c; }
    .summary-label.audit.enabled svg { color:#c2410c; }
    .summary-value { font-size:24px; font-weight:500; }
    .summary-value.budget { color:#16a34a; }
    .summary-value.milestones { color:#0369a1; }
    .summary-value.deadline { color:#7c3aed; font-size:14px; }
    .summary-value.audit { color:#4b5563; font-size:14px; }
    .summary-value.audit.enabled { color:#c2410c; }
    .summary-subtext { font-size:12px; margin-top:4px; }
    .summary-subtext.budget { color:#16a34a; }
    .summary-subtext.milestones { color:#0369a1; }
    @media(max-width:1024px){ .post-container{ grid-template-columns:1fr; } .grid-3{ grid-template-columns:1fr 1fr; } .sidebar{ position:static; } }
    @media(max-width:640px){ .grid-3{ grid-template-columns:1fr; } .action-buttons{ flex-direction:column; } }
  </style>
  <script>
    const skillSuggestions = ['React','TypeScript','Node.js','Web Design','JavaScript','Vue.js','Angular','Python','Django','FastAPI','Express.js','MongoDB','PostgreSQL','MySQL','AWS','Google Cloud','Azure','Docker','Kubernetes','Jenkins','CI/CD','Figma','Sketch','Adobe XD','UI Design','UX Design','Responsive Design','CSS','HTML','SASS','Tailwind','Bootstrap','Flutter','Dart','Swift','Kotlin','Java','C#','PHP','Laravel','Symfony','Ruby','Rails','GraphQL','REST API','OAuth','JWT','Authentication','Database Design','System Design','Machine Learning','TensorFlow','PyTorch','NLP','Computer Vision','Data Analysis','Pandas','NumPy','Matplotlib','Tableau','Power BI','Analytics','Git','GitHub','GitLab','Bitbucket','SVN','Linux','Unix','Windows','MacOS','Bash','Shell','PowerShell','Python Scripting','Automation','Testing','Jest','Mocha','Pytest','Selenium','QA','Manual Testing','Load Testing','Performance Testing','Security','Penetration Testing','Cybersecurity','SSL/TLS','Encryption','OWASP','API Security','Web Security','SEO','SEM','PPC','Content Marketing','Email Marketing','Social Media','Facebook Ads','Google Ads','Analytics','Google Analytics','Mixpanel','Amplitude','Product Management','Agile','Scrum','Kanban','Project Management','JIRA','Asana','Monday.com','Notion','Slack','Communication','Leadership','Team Management','Training','Documentation','Technical Writing','Copywriting','Content Strategy','Brand Strategy','User Research','Usability Testing','A/B Testing','Conversion Rate Optimization','Customer Support','Customer Success','Sales','Negotiation','Contract Negotiation','Legal','Compliance','GDPR','HIPAA','SOC 2','ISO','Quality Assurance','Code Review','Refactoring','Optimization','Performance Tuning','Caching','CDN','Load Balancing','Microservices','Serverless','Lambda','Cloud Functions','Firebase','Supabase','Sanity','Contentful','Headless CMS','Static Site Generation','Next.js','Gatsby','Hugo','Jekyll','WordPress','Shopify','WooCommerce','Magento','BigCommerce','E-commerce','Payment Processing','Stripe','PayPal','Square','Blockchain','Crypto','Web3','Smart Contracts','Solidity','Ethereum','Bitcoin','NFT','Virtual Reality','Augmented Reality','3D Modeling','Blender','Unity','Unreal Engine','Game Development','Level Design','Game Art','Sound Design','Music Production','Video Production','Video Editing','Adobe Creative Suite','Premiere','After Effects','Lighting','Photography','Motion Graphics','Animation','2D Animation','3D Animation','Rigging','Modeling','Texturing','Rendering','Visualization','Data Visualization','Infographics','Illustration','Vector Art','Iconography','Logo Design','Branding','Package Design','Print Design','Layout Design','Typography','Color Theory','Design Systems','Component Libraries','Accessibility','WCAG','Inclusive Design','Mobile First','Progressive Web Apps','Service Workers','Offline Support','Caching Strategies','State Management','Redux','MobX','Vuex','Context API','Hooks','Composition API','Async/Await','Promises','Callbacks','Error Handling','Logging','Monitoring','Sentry','Datadog','New Relic','APM','Observability','Telemetry','Event Tracking','User Tracking','Privacy','Analytics Privacy','GDPR Compliance','Data Privacy','Security Audit','Vulnerability Assessment','Bug Bounty','Incident Response','Disaster Recovery','Backup Strategy','Data Recovery','Version Control','Branching Strategies','Code Owners','Pull Requests','Code Reviews','Pair Programming','Mob Programming','Test-Driven Development','Behavior-Driven Development','Acceptance Testing','Integration Testing','Unit Testing','End-to-End Testing','Contract Testing','Snapshot Testing','Visual Regression Testing','Performance Testing','Load Testing','Stress Testing','Chaos Engineering','Infrastructure as Code','Terraform','Ansible','Puppet','Chef','Containers','Docker Compose','Orchestration','Kubernetes','OpenShift','AWS ECS','Cloud Deployment','CI/CD Pipeline','GitHub Actions','GitLab CI','CircleCI','Travis CI','Jenkins','Monitoring','Alerting','Logging','Log Aggregation','ELK Stack','Splunk','Cloudwatch','Metrics','Prometheus','Grafana','Cost Optimization','Resource Management','Scaling','Horizontal Scaling','Vertical Scaling','Caching Strategies','Database Optimization','Query Optimization','Index Optimization','Sharding','Partitioning','Replication','Backup','Disaster Recovery','Business Continuity','Incident Management','Change Management','Release Management','Deployment Strategy','Blue-Green Deployment','Canary Deployment','Rolling Deployment','Feature Flags','A/B Testing'];

    let formState = {
      taskTitle: '',
      category: 'Web Development',
      description: '',
      skills: [],
      skillInput: '',
      deadline: '',
      budget: 0,
      currency: 'USD',
      auditEnabled: false,
      milestones: [],
      showMilestoneForm: false,
      newMilestone: { title: '', description: '', budget: '' }
    };

    let editingMilestoneIndex = null;

    function handleAddSkill() {
      if (formState.skillInput.trim() && !formState.skills.includes(formState.skillInput)) {
        formState.skills.push(formState.skillInput);
        formState.skillInput = '';
        renderSkills();
        renderSuggestions();
      }
    }

    function handleSelectSkillSuggestion(skill) {
      if (!formState.skills.includes(skill)) {
        formState.skills.push(skill);
        formState.skillInput = '';
        renderSkills();
        renderSuggestions();
      }
    }

    function handleRemoveSkill(idx) {
      formState.skills.splice(idx, 1);
      renderSkills();
      renderSuggestions();
    }

    function handleAddMilestone() {
      // Validate milestone fields
      const titleEl = document.getElementById('newMilestoneTitle');
      const budgetEl = document.getElementById('newMilestoneBudget');
      let valid = true;

      if (!formState.newMilestone.title || formState.newMilestone.title.trim().length < 3) {
        if (titleEl) { titleEl.style.borderColor = '#ef4444'; titleEl.style.boxShadow = '0 0 0 2px rgba(239,68,68,0.15)'; }
        Validate.toast('Milestone title must be at least 3 characters.', 'error');
        valid = false;
      } else if (titleEl) { titleEl.style.borderColor = ''; titleEl.style.boxShadow = ''; }

      if (!formState.newMilestone.budget || parseFloat(formState.newMilestone.budget) <= 0) {
        if (budgetEl) { budgetEl.style.borderColor = '#ef4444'; budgetEl.style.boxShadow = '0 0 0 2px rgba(239,68,68,0.15)'; }
        if (valid) Validate.toast('Milestone budget must be greater than 0.', 'error');
        valid = false;
      } else if (budgetEl) { budgetEl.style.borderColor = ''; budgetEl.style.boxShadow = ''; }

      if (!valid) return;

      if (editingMilestoneIndex !== null) {
        formState.milestones[editingMilestoneIndex] = { ...formState.newMilestone };
        editingMilestoneIndex = null;
      } else {
        formState.milestones.push({ ...formState.newMilestone });
      }
      formState.newMilestone = { title: '', description: '', budget: '' };
      formState.showMilestoneForm = false;
      renderMilestones();
      updateSummary();
    }

    function handleRemoveMilestone(idx) {
      formState.milestones.splice(idx, 1);
      renderMilestones();
      updateSummary();
    }

    function handleEditMilestone(idx) {
      editingMilestoneIndex = idx;
      formState.newMilestone = { ...formState.milestones[idx] };
      formState.showMilestoneForm = true;
      renderMilestones();
    }

    function getDaysUntilDeadline() {
      if (!formState.deadline) return null;
      const today = new Date();
      today.setHours(0,0,0,0);
      const deadline = new Date(formState.deadline);
      deadline.setHours(0,0,0,0);
      const diff = deadline - today;
      return Math.ceil(diff / (1000*60*60*24));
    }

    function renderSkills() {
      const container = document.getElementById('skillsContainer');
      if (!container) return;
      container.innerHTML = formState.skills.map((skill, idx) => `
        <div class="skill-tag">
          <span>${skill}</span>
          <button type="button" onclick="handleRemoveSkill(${idx})">✕</button>
        </div>
      `).join('');
    }

    function renderSuggestions() {
      const input = document.getElementById('skillInput');
      const dropdown = document.getElementById('skillSuggestions');
      if (!input || !dropdown) return;

      const filtered = skillSuggestions.filter(s => 
        s.toLowerCase().includes(formState.skillInput.toLowerCase()) && 
        !formState.skills.includes(s)
      );

      if (formState.skillInput && filtered.length > 0) {
        dropdown.classList.add('active');
        dropdown.innerHTML = filtered.slice(0,8).map(s => `
          <div class="suggestion-item" onclick="handleSelectSkillSuggestion('${s}')">${s}</div>
        `).join('');
      } else {
        dropdown.classList.remove('active');
      }
    }

    function renderMilestones() {
      const container = document.getElementById('milestonesContainer');
      if (!container) return;

      if (!formState.showMilestoneForm && formState.milestones.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p>No milestones added yet. Click below to add one.</p>
          </div>
        `;
      } else {
        let html = '';
        if (formState.showMilestoneForm) {
          html += `
            <div class="milestone-form">
              <div class="form-group">
                <label class="form-label">Milestone Title</label>
                <input type="text" class="form-input" id="newMilestoneTitle" value="${formState.newMilestone.title}" 
                  onchange="formState.newMilestone.title = this.value" placeholder="e.g. Design Phase" />
              </div>
              <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-input" id="newMilestoneDesc" rows="3" 
                  onchange="formState.newMilestone.description = this.value" placeholder="What's the deliverable?">${formState.newMilestone.description}</textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Budget</label>
                <input type="number" class="form-input" id="newMilestoneBudget" value="${formState.newMilestone.budget}" 
                  onchange="formState.newMilestone.budget = this.value" placeholder="Amount" />
              </div>
              <div class="milestone-form-actions">
                <button class="save" type="button" onclick="handleAddMilestone()">Save Milestone</button>
                <button class="cancel" type="button" onclick="formState.showMilestoneForm = false; editingMilestoneIndex = null; renderMilestones()">Cancel</button>
              </div>
            </div>
          `;
        }
        html += formState.milestones.map((m, idx) => `
          <div class="milestone-card">
            <div class="milestone-content">
              <div class="milestone-title">
                <div class="milestone-index">${idx + 1}</div>
                <h3>${m.title}</h3>
              </div>
              <div class="milestone-desc">${m.description}</div>
              <div class="milestone-budget">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ${formState.currency} ${m.budget}
              </div>
            </div>
            <button class="milestone-delete" type="button" onclick="handleRemoveMilestone(${idx})">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>
        `).join('');
        container.innerHTML = html;
      }
    }

    function updateSummary() {
      const milestoneCost = formState.milestones.reduce((sum, m) => sum + parseFloat(m.budget || 0), 0);
      const totalBudget = parseFloat(formState.budget || 0);

      const budgetEl = document.getElementById('summarySummaryBudget');
      const milestoneEl = document.getElementById('summaryMilestones');
      const deadlineEl = document.getElementById('summaryDeadline');
      const auditEl = document.getElementById('summaryAudit');

      if (budgetEl) budgetEl.innerHTML = `${formState.currency} ${isNaN(totalBudget) ? 0 : totalBudget.toLocaleString()}`;
      if (milestoneEl) milestoneEl.innerHTML = `${formState.milestones.length}`;
      if (deadlineEl) deadlineEl.innerHTML = formState.deadline ? `${getDaysUntilDeadline()} day${getDaysUntilDeadline() === 1 ? '' : 's'}` : 'Not set';
      if (auditEl) auditEl.innerHTML = formState.auditEnabled ? 'Enabled' : 'Disabled';

      renderBudgetCheck(milestoneCost, totalBudget);
      renderWalletCheck(totalBudget);
    }

    function renderWalletCheck(totalBudget) {
      const container = document.getElementById('walletCheckSummary');
      if (!container) return;

      const session = typeof Auth !== "undefined" ? Auth.getCurrentUser() : null;
      const userId = session?.userId || 'u1';
      const user = Store.getUserById(userId);
      const walletBalance = user?.walletBalance || 0;
      const isInsufficient = totalBudget > walletBalance;

      container.innerHTML = `
        <div class="summary-item ${isInsufficient ? 'audit' : 'milestones'}" style="margin-top:12px;">
          <div class="summary-label ${isInsufficient ? 'audit' : 'milestones'}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Wallet Balance
          </div>
          <div class="summary-value ${isInsufficient ? 'audit' : 'milestones'}" style="color:${isInsufficient ? '#dc2626' : '#10b981'};font-size:16px;">${formState.currency} ${walletBalance.toLocaleString()}</div>
          ${isInsufficient ? `<div style="font-size:11px;margin-top:6px;color:#991b1b;">Insufficient balance. Add funds to proceed.</div>` : ''}
        </div>
      `;
    }

    function renderBudgetCheck(milestoneCost, totalBudget) {
      const container = document.getElementById('budgetCheckContainer');
      if (!container) return;

      const isExceeded = milestoneCost > totalBudget;

      container.innerHTML = `
        <div class="budget-check ${isExceeded ? 'exceeded' : 'ok'}">
          <div class="budget-check-item">
            <span>Milestone total:</span>
            <strong>${formState.currency} ${milestoneCost.toLocaleString()}</strong>
          </div>
          <div class="budget-check-item">
            <span>Project Budget:</span>
            <strong>${formState.currency} ${totalBudget.toLocaleString()}</strong>
          </div>
          ${isExceeded ? `
            <div class="budget-check-divider"></div>
            <div class="budget-check-warning">
              <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
              <p>Milestone costs exceed your budget. Adjust milestones or increase budget.</p>
            </div>
          ` : ''}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('client')) return;
      const content = `
        <div class="post-container">
          <div>
            <div class="section-card">
              <h2>Basic Information</h2>
              <div class="form-group">
                <label class="form-label">Task Title <span class="required">*</span></label>
                <input type="text" class="form-input" id="taskTitleInput" placeholder="e.g. E-commerce Website Redesign"
                  onchange="formState.taskTitle = this.value" />
              </div>
              <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" onchange="formState.category = this.value">
                  <option>Web Development</option>
                  <option>Mobile Development</option>
                  <option>Backend / API</option>
                  <option>UI/UX Design</option>
                  <option>AI / Machine Learning</option>
                  <option>DevOps / Cloud</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Description <span class="required">*</span></label>
                <textarea class="form-textarea" rows="5" placeholder="Describe what you need done, goals, and requirements..."
                  onchange="formState.description = this.value"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Deadline</label>
                <input type="date" class="form-input" onchange="formState.deadline = this.value; updateSummary()" />
              </div>
              <div class="form-group">
                <label class="form-label">Required Skills</label>
                <div style="position:relative;">
                  <input type="text" class="form-input" id="skillInput" placeholder="Start typing to add skills..."
                    onchange="formState.skillInput = this.value; renderSuggestions()"
                    oninput="formState.skillInput = this.value; renderSuggestions()"
                    onkeypress="if(event.key==='Enter') { event.preventDefault(); handleAddSkill(); }" />
                  <div class="suggestion-dropdown" id="skillSuggestions"></div>
                </div>
                <div class="skills-container" id="skillsContainer"></div>
              </div>
            </div>

            <div class="section-card budget-escrow">
              <h2>Budget & Escrow</h2>
              <div class="grid-2" style="margin-bottom:16px;">
                <div class="form-group">
                  <label class="form-label">Total Budget <span class="required">*</span></label>
                  <div style="position:relative;">
                    <i data-lucide="dollar-sign" class="input-icon"></i>
                    <input type="number" class="form-input with-icon" value="${formState.budget || ''}" placeholder="5000" onchange="formState.budget = this.value; updateSummary()" oninput="formState.budget = this.value; updateSummary()" />
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Currency</label>
                  <select class="form-select" onchange="formState.currency = this.value; updateSummary()">
                    <option value="USD" ${formState.currency === 'USD' ? 'selected' : ''}>USD</option>
                    <option value="EUR" ${formState.currency === 'EUR' ? 'selected' : ''}>EUR</option>
                    <option value="GBP" ${formState.currency === 'GBP' ? 'selected' : ''}>GBP</option>
                  </select>
                </div>
              </div>
              <div class="audit-toggle">
                <div class="audit-info">
                  <div class="audit-label">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m7 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Technical Audit
                  </div>
                  <div class="audit-desc">Enable technical review for advanced quality assurance</div>
                </div>
                <button class="toggle-switch ${formState.auditEnabled ? 'on' : 'off'}" type="button" 
                  onclick="formState.auditEnabled = !formState.auditEnabled; updateSummary(); this.classList.toggle('on'); this.classList.toggle('off');">
                  <div class="toggle-switch-thumb"></div>
                </button>
              </div>
            </div>

            <div class="section-card">
              <h2>Milestones</h2>
              <div id="milestonesContainer"></div>
              ${!formState.showMilestoneForm ? `
                <button class="add-milestone-btn" type="button" onclick="formState.showMilestoneForm = true; renderMilestones()">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                  Add Milestone
                </button>
              ` : ''}
            </div>

            <div class="action-buttons">
              <button type="button" class="save-draft" onclick="saveDraft()">Save Draft</button>
              <button type="button" class="publish" onclick="publishTask()">Publish Task</button>
            </div>
          </div>

          <div class="post-sidebar">
            <div class="sidebar-card">
              <h3>Project Summary</h3>
              
              <div class="summary-item budget">
                <div class="summary-label budget">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  Budget
                </div>
                <div class="summary-value budget" id="summarySummaryBudget">USD 0</div>
              </div>

              <div class="summary-item milestones">
                <div class="summary-label milestones">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  Milestones
                </div>
                <div class="summary-value milestones" id="summaryMilestones">0</div>
              </div>

              <div class="summary-item deadline">
                <div class="summary-label deadline">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                  Deadline
                </div>
                <div class="summary-value deadline" id="summaryDeadline">Not set</div>
              </div>

              <div class="summary-item audit ${formState.auditEnabled ? 'enabled' : ''}">
                <div class="summary-label audit ${formState.auditEnabled ? 'enabled' : ''}">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m7 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  Audit
                </div>
                <div class="summary-value audit ${formState.auditEnabled ? 'enabled' : ''}" id="summaryAudit">Disabled</div>
              </div>

              <div id="walletCheckSummary"></div>
            </div>
          </div>
        </div>
      `;

      initDashboard({
        role: 'client',
        activePath: 'post-task.html',
        pageTitle: 'Post a Task',
        pageSubtitle: 'Create and publish a new freelance task',
        content
      });

      setTimeout(() => {
        lucide.createIcons();
        renderSkills();
        renderMilestones();
        updateSummary();

        // Wire input change events for validation auto-clear
        document.getElementById('taskTitleInput')?.addEventListener('input', e => { formState.taskTitle = e.target.value; Validate.clearError('taskTitleInput'); });
      }, 100);
    });

    function validateTaskForm() {
      const title = document.getElementById('taskTitleInput')?.value.trim() || '';
      const desc = document.querySelector('textarea[onchange*="description"]')?.value.trim() || '';
      const budget = formState.budget;

      let valid = true;

      if (!title) { Validate.showError('taskTitleInput', 'Task title is required.'); valid = false; }
      else if (title.length < 5) { Validate.showError('taskTitleInput', 'Title must be at least 5 characters.'); valid = false; }
      else Validate.clearError('taskTitleInput');

      if (!budget || parseFloat(budget) <= 0) {
        Validate.toast('Please enter a valid budget greater than 0.', 'error'); valid = false;
      }

      if (formState.milestones.length === 0) {
        Validate.toast('Please add at least one milestone before publishing.', 'error'); valid = false;
      }

      return valid;
    }

    function publishTask() {
      if (!validateTaskForm()) return;

      const session = typeof Auth !== "undefined" ? Auth.getCurrentUser() : null;
      const desc = document.querySelector('.form-textarea')?.value.trim() || formState.description;
      const clientId = session?.userId || 'u1';
      const budget = parseFloat(formState.budget);

      // Check wallet balance
      const user = Store.getUserById(clientId);
      if (!user) {
        Validate.toast('User not found. Please log in again.', 'error');
        return;
      }

      if (user.walletBalance < budget) {
        Validate.toast(`Insufficient balance! You have $${user.walletBalance.toLocaleString()} but need $${budget.toLocaleString()}.`, 'error');
        return;
      }

      // Create task
      const task = Store.createTask({
        title: formState.taskTitle,
        category: formState.category,
        description: desc,
        skills: formState.skills,
        deadline: formState.deadline,
        budget: budget,
        currency: formState.currency,
        auditEnabled: formState.auditEnabled,
        clientId: clientId,
        status: 'open',
      });

      // Create milestones
      formState.milestones.forEach(m => {
        Store.createMilestone({ taskId: task.id, title: m.title, description: m.description, budget: parseFloat(m.budget), workerId: clientId });
      });

      // Deduct budget from wallet
      const updated = Store.deductFromWallet(clientId, budget);
      if (!updated) {
        Validate.toast('Failed to deduct from wallet. Task creation failed.', 'error');
        return;
      }

      // Create escrow transaction
      Store.createTransaction({
        type: 'escrow-lock',
        amount: budget,
        fromId: clientId,
        toId: 'escrow',
        taskId: task.id,
        milestoneId: null,
        description: `Escrow funded for ${formState.taskTitle}`,
        status: 'completed'
      });

      Validate.toast('Task published successfully! Budget transferred to escrow.', 'success');
      setTimeout(() => { window.location.href = 'client-my-projects.html'; }, 1200);
    }

    function saveDraft() {
      const title = document.getElementById('taskTitleInput')?.value.trim() || '';
      if (!title) { Validate.showError('taskTitleInput', 'Task title is required to save draft.'); return; }
      Validate.toast('Draft saved successfully.', 'info');
    }
  </script>
</head>
<body></body>
</html>
