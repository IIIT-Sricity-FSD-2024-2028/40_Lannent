<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technical Audit Report — Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <style>
    /* ── Layout ── */
    .report-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 960px) { .report-layout { grid-template-columns: 1fr; } }

    /* ── Shared card ── */
    .rc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .rc:last-child { margin-bottom: 0; }
    .rc-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rc-head-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .rc-head-title { font-size: 14px; font-weight: 600; }
    .rc-body { padding: 20px; }

    /* ── Report header banner ── */
    .report-header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4f46e5 100%);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .report-header::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .report-id-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .report-title-main {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .report-subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 20px;
    }
    .report-meta-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .report-meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .report-meta-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }
    .report-meta-value { font-size: 13px; font-weight: 600; }

    /* ── Decision verdict banner ── */
    .verdict-banner {
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      border: 1.5px solid;
    }
    .verdict-approved      { background:#d1fae5; border-color:#6ee7b7; }
    .verdict-approved-rec  { background:#d1fae5; border-color:#6ee7b7; }
    .verdict-rejected      { background:#fee2e2; border-color:#fca5a5; }
    .verdict-request-fix   { background:#fff7ed; border-color:#fdba74; }
    .verdict-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .verdict-approved .verdict-icon-wrap,
    .verdict-approved-rec .verdict-icon-wrap { background:#10b981; }
    .verdict-rejected .verdict-icon-wrap     { background:#ef4444; }
    .verdict-request-fix .verdict-icon-wrap  { background:#f59e0b; }

    .verdict-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 2px;
    }
    .verdict-approved .verdict-label,
    .verdict-approved-rec .verdict-label { color:#065f46; }
    .verdict-rejected .verdict-label     { color:#b91c1c; }
    .verdict-request-fix .verdict-label  { color:#92400e; }

    .verdict-text { font-size: 14px; font-weight: 600; }
    .verdict-approved .verdict-text,
    .verdict-approved-rec .verdict-text { color:#065f46; }
    .verdict-rejected .verdict-text     { color:#b91c1c; }
    .verdict-request-fix .verdict-text  { color:#92400e; }

    /* ── Info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .info-cell { display: flex; flex-direction: column; gap: 3px; }
    .info-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted-foreground);
    }
    .info-value { font-size: 14px; font-weight: 500; }
    .info-value.mono { font-family: monospace; font-size: 13px; }

    /* ── Checklist items (read-only) ── */
    .checklist-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: var(--input-bg);
    }
    .checklist-icon-pass { color: #10b981; }
    .checklist-icon-fail { color: #ef4444; }
    .checklist-label { font-size: 13px; }
    .checklist-label.passed { color: var(--foreground); }
    .checklist-label.failed { color: var(--muted-foreground); text-decoration: line-through; }

    /* ── Severity chip ── */
    .sev-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 8px;
      border-left: 3px solid;
      font-size: 12px;
      font-weight: 500;
    }
    .sev-critical   { background:#fef2f2; border-color:#ef4444; color:#b91c1c; }
    .sev-major      { background:#fff7ed; border-color:#f59e0b; color:#92400e; }
    .sev-minor      { background:#fffbeb; border-color:#eab308; color:#854d0e; }
    .sev-suggestion { background:#eff6ff; border-color:#3b82f6; color:#1d4ed8; }

    /* ── Finding card ── */
    .finding-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .finding-card:last-child { margin-bottom: 0; }
    .finding-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .finding-desc  { font-size: 13px; color: var(--muted-foreground); line-height: 1.6; }

    /* ── Rating stars ── */
    .star-row { display: flex; gap: 3px; margin-top: 4px; }
    .star-filled { color: #f59e0b; }
    .star-empty  { color: #d1d5db; }

    /* ── File row ── */
    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .file-row:last-child { border-bottom: none; }
    .file-icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .file-name { font-size: 13px; font-weight: 500; }
    .file-size { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; }

    /* ── Expert signature card ── */
    .expert-sig {
      background: linear-gradient(145deg, #f5f3ff, #ede9fe);
      border: 1.5px solid #c4b5fd;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
    .expert-avatar {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      margin: 0 auto 10px;
    }
    .expert-name { font-size: 15px; font-weight: 700; color: #4c1d95; margin-bottom: 2px; }
    .expert-role { font-size: 12px; color: #6d28d9; }

    /* ── Print button ── */
    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--foreground);
    }
    .btn-print:hover { background: var(--secondary); }

    /* ── Divider ── */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── Summary textarea display ── */
    .summary-box {
      background: var(--input-bg);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      color: var(--foreground);
      line-height: 1.7;
    }
  </style>

  <script>
    // ── Store-wired audit logic ───────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && !Auth.requireRole('expert', 'client', 'worker')) return;
      const session = Auth.getCurrentUser();
      const params = new URLSearchParams(window.location.search);
      const auditId = params.get('id') || params.get('reportId');
      const role = params.get('role') || (session ? session.role : 'expert');

      // Load audit request + linked objects
      let req = auditId ? Store.getAuditRequestById(auditId) : null;
      // Fallback: load first pending/in-review request assigned to this expert
      if (!req) {
        const all = Store.getAuditRequests();
        req = all.find(a => a.status !== 'Completed' && (a.expertId === session.userId || !a.expertId)) || all[0] || null;
      }

      if (!req) {
        document.body.innerHTML = '<div style="padding:80px;text-align:center;color:#6b7280;font-size:16px;">No audit request found. <a href="expert-audit-requests.html" style="color:#6366f1;">Go to Audit Requests</a></div>';
        return;
      }

      const task = Store.getTaskById(req.taskId);
      const worker = Store.getUserById(req.workerId);
      const client = Store.getUserById(req.clientId);
      const milestone = Store.getMilestoneById(req.milestoneId);
      const existingReport = Store.getAuditReportByRequest(req.id);

      // ── State ─────────────────────────────────────────────────────
      let checklist = [
        { id:'c1', label:'Code meets project requirements',     passed: null },
        { id:'c2', label:'Documentation is complete and clear', passed: null },
        { id:'c3', label:'All files are accessible and working',passed: null },
        { id:'c4', label:'No critical security vulnerabilities', passed: null },
        { id:'c5', label:'Quality standards are met',           passed: null },
      ];
      let scores = { codequality:0, security:0, performance:0, documentation:0 };
      let verdict = null;

      // Pre-populate if report exists
      if (existingReport && existingReport.verdict) {
        verdict = existingReport.verdict;
        scores = { codequality: existingReport.codequality||0, security: existingReport.security||0, performance: existingReport.performance||0, documentation: existingReport.documentation||0 };
      }

      const isCompleted = req.status === 'Completed' || (existingReport && existingReport.verdict);

      function renderStars(category, val) {
        return [1,2,3,4,5].map(n => `
          <span onclick="${isCompleted?'':(`setScore('${category}',${n})`)}" style="cursor:${isCompleted?'default':'pointer'};font-size:24px;color:${n<=val?'#f59e0b':'#d1d5db'};transition:color 0.15s;" onmouseenter="if(!${isCompleted})highlightStars('${category}',${n})" onmouseleave="if(!${isCompleted})highlightStars('${category}',scores['${category}'])">★</span>`).join('');
      }

      function renderChecklist() {
        return checklist.map(item => `
          <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:var(--secondary);margin-bottom:8px;">
            <button onclick="${isCompleted?'':(`toggleCheck('${item.id}',true)`)}" style="width:28px;height:28px;border-radius:7px;border:none;background:${item.passed===true?'#10b981':'#e5e7eb'};color:${item.passed===true?'white':'#9ca3af'};cursor:${isCompleted?'default':'pointer'};font-size:14px;transition:all 0.15s;">✓</button>
            <button onclick="${isCompleted?'':(`toggleCheck('${item.id}',false)`)}" style="width:28px;height:28px;border-radius:7px;border:none;background:${item.passed===false?'#ef4444':'#e5e7eb'};color:${item.passed===false?'white':'#9ca3af'};cursor:${isCompleted?'default':'pointer'};font-size:14px;transition:all 0.15s;">✗</button>
            <span style="flex:1;font-size:13px;font-weight:500;${item.passed===false?'text-decoration:line-through;color:var(--muted-foreground);':''}">${item.label}</span>
            <span style="font-size:12px;font-weight:500;${item.passed===true?'color:#10b981':item.passed===false?'color:#ef4444':'color:#9ca3af'}">${item.passed===true?'Pass':item.passed===false?'Fail':'—'}</span>
          </div>`).join('');
      }

      function buildContent() {
        return `
          <!-- Header info -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;">
            <div class="stat-card">
              <div>
                <div style="font-size:12px;color:var(--muted-foreground);margin-bottom:4px;">Project</div>
                <div style="font-weight:600;font-size:14px;">${req.project || (task ? task.title : 'N/A')}</div>
              </div>
              <div class="stat-icon-wrap" style="background:#eef2ff;"><i data-lucide="folder" style="width:18px;height:18px;color:#6366f1;"></i></div>
            </div>
            <div class="stat-card">
              <div>
                <div style="font-size:12px;color:var(--muted-foreground);margin-bottom:4px;">Milestone</div>
                <div style="font-weight:600;font-size:14px;">${req.milestone || (milestone ? milestone.title : 'N/A')}</div>
              </div>
              <div class="stat-icon-wrap" style="background:#ecfdf5;"><i data-lucide="check-square" style="width:18px;height:18px;color:#10b981;"></i></div>
            </div>
            <div class="stat-card">
              <div>
                <div style="font-size:12px;color:var(--muted-foreground);margin-bottom:4px;">Worker</div>
                <div style="font-weight:600;font-size:14px;">${req.worker || (worker ? worker.name : 'N/A')}</div>
              </div>
              <div class="stat-icon-wrap" style="background:#faf5ff;"><i data-lucide="user" style="width:18px;height:18px;color:#a855f7;"></i></div>
            </div>
          </div>

          ${isCompleted && existingReport ? `
          <div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;">
            <i data-lucide="check-circle-2" style="width:22px;height:22px;color:#065f46;flex-shrink:0;"></i>
            <div>
              <div style="font-weight:600;color:#065f46;">Report Already Submitted</div>
              <div style="font-size:13px;color:#047857;">Verdict: <strong>${existingReport.verdict === 'pass' ? 'PASS ✓' : 'FAIL ✗'}</strong> — submitted on ${existingReport.createdAt || 'N/A'}</div>
            </div>
          </div>` : ''}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
            <!-- Left: Deliverable info + checklist -->
            <div>
              <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Deliverable Details</h3>
                <div style="font-size:13px;color:var(--muted-foreground);margin-bottom:8px;">
                  <strong>Status:</strong> ${req.status}
                </div>
                <div style="font-size:13px;color:var(--muted-foreground);margin-bottom:8px;">
                  <strong>Severity:</strong> ${req.severity || 'Medium'}
                </div>
                <div style="font-size:13px;color:var(--muted-foreground);margin-bottom:8px;">
                  <strong>Due Date:</strong> ${req.dueDate ? new Date(req.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'N/A'}
                </div>
                ${milestone && milestone.description ? `<div style="margin-top:12px;font-size:13px;color:#374151;line-height:1.6;">${milestone.description}</div>` : ''}
              </div>

              <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;">
                <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Quality Checklist</h3>
                <div id="checklistContainer">${renderChecklist()}</div>
              </div>
            </div>

            <!-- Right: Scores + findings + submit -->
            <div>
              <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">Quality Scores</h3>
                ${['codequality','security','performance','documentation'].map(cat => `
                  <div style="margin-bottom:16px;">
                    <div style="font-size:13px;font-weight:500;margin-bottom:6px;text-transform:capitalize;">${cat.replace('codequality','Code Quality')}</div>
                    <div id="stars-${cat}">${renderStars(cat, scores[cat])}</div>
                  </div>`).join('')}
              </div>

              <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;">
                <h3 style="font-size:15px;font-weight:600;margin-bottom:12px;">Findings & Verdict</h3>
                <textarea id="findingsText" rows="5" ${isCompleted?'readonly':''} placeholder="Describe your technical findings, issues found, and overall assessment..." style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;background:${isCompleted?'var(--secondary)':'var(--input-bg)'};">${existingReport ? (existingReport.findings||'') : ''}</textarea>
                <div id="findingsErr" style="font-size:12px;color:#ef4444;margin-top:4px;display:none;"></div>

                <div style="margin-top:16px;">
                  <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Verdict</div>
                  <div style="display:flex;gap:10px;">
                    <button id="verdictPass" onclick="setVerdict('pass')" style="flex:1;padding:10px;border-radius:10px;border:2px solid ${verdict==='pass'?'#10b981':'var(--border)'};background:${verdict==='pass'?'#d1fae5':'white'};font-weight:600;font-size:13px;cursor:${isCompleted?'default':'pointer'};color:${verdict==='pass'?'#065f46':'var(--foreground)'};">✓ Pass</button>
                    <button id="verdictFail" onclick="setVerdict('fail')" style="flex:1;padding:10px;border-radius:10px;border:2px solid ${verdict==='fail'?'#ef4444':'var(--border)'};background:${verdict==='fail'?'#fee2e2':'white'};font-weight:600;font-size:13px;cursor:${isCompleted?'default':'pointer'};color:${verdict==='fail'?'#b91c1c':'var(--foreground)'};">✗ Fail</button>
                  </div>
                  <div id="verdictErr" style="font-size:12px;color:#ef4444;margin-top:4px;display:none;"></div>
                </div>
              </div>

              ${!isCompleted ? `
              <button onclick="submitAuditReport()" class="btn-primary" style="width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;">
                Submit Audit Report
              </button>` : ''}
            </div>
          </div>`;
      }

      initDashboard({
        role: role,
        activePath: role === 'worker' ? 'worker-milestone-board.html' : role === 'client' ? 'client-my-projects.html' : 'expert-audit-requests.html',
        pageTitle:'Technical Audit Report',
        pageSubtitle:`Audit request for ${req.project || 'project'}`,
        content: buildContent()
      });
      lucide.createIcons();

      // ── Actions ────────────────────────────────────────────────
      window.toggleCheck = function(id, passed) {
        const item = checklist.find(c => c.id === id);
        if (item) {
          item.passed = item.passed === passed ? null : passed;
          const c = document.getElementById('checklistContainer');
          if (c) { c.innerHTML = renderChecklist(); lucide.createIcons(); }
        }
      };

      window.highlightStars = function(cat, val) {
        const el = document.getElementById('stars-' + cat);
        if (el) el.innerHTML = renderStars(cat, val);
      };

      window.setScore = function(cat, val) {
        scores[cat] = val;
        const el = document.getElementById('stars-' + cat);
        if (el) el.innerHTML = renderStars(cat, val);
      };

      window.setVerdict = function(v) {
        if (isCompleted) return;
        verdict = v;
        const pass = document.getElementById('verdictPass');
        const fail = document.getElementById('verdictFail');
        const errEl = document.getElementById('verdictErr');
        if (errEl) errEl.style.display = 'none';
        if (pass) { pass.style.borderColor = v==='pass'?'#10b981':'var(--border)'; pass.style.background = v==='pass'?'#d1fae5':'white'; pass.style.color = v==='pass'?'#065f46':'var(--foreground)'; }
        if (fail) { fail.style.borderColor = v==='fail'?'#ef4444':'var(--border)'; fail.style.background = v==='fail'?'#fee2e2':'white'; fail.style.color = v==='fail'?'#b91c1c':'var(--foreground)'; }
      };

      window.submitAuditReport = function() {
        const findings = document.getElementById('findingsText')?.value?.trim() || '';
        let valid = true;

        // Validate findings
        const findErr = document.getElementById('findingsErr');
        findErr.style.display = 'none';
        document.getElementById('findingsText').style.borderColor = 'var(--border)';
        if (!findings || findings.length < 30) {
          findErr.textContent = 'Findings must be at least 30 characters.';
          findErr.style.display = 'block';
          document.getElementById('findingsText').style.borderColor = '#ef4444';
          valid = false;
        }

        // Validate verdict
        const vErr = document.getElementById('verdictErr');
        vErr.style.display = 'none';
        if (!verdict) {
          vErr.textContent = 'Please select a verdict (Pass or Fail).';
          vErr.style.display = 'block';
          valid = false;
        }

        // Validate checklist — at least 3 items reviewed
        const reviewed = checklist.filter(c => c.passed !== null).length;
        if (reviewed < 3) {
          Validate.toast('Please review at least 3 checklist items before submitting.', 'error');
          valid = false;
        }

        if (!valid) return;

        // Save to Store
        try {
          Store.saveAuditReport({
            auditRequestId: req.id,
            taskId: req.taskId,
            milestoneId: req.milestoneId,
            expertId: session.userId,
            verdict,
            overall: verdict === 'pass' ? 'Pass' : 'Fail',
            findings,
            codequality: scores.codequality,
            security: scores.security,
            performance: scores.performance,
            documentation: scores.documentation,
            createdAt: new Date().toISOString().slice(0,10),
            milestoneTitle: req.milestone,
            projectTitle: req.project || (task ? task.title : ''),
            workerName: req.worker || (worker ? worker.name : '')
          });

          // Update audit request status
          Store.updateAuditRequest(req.id, { status: 'Completed', expertId: session.userId });

          // Update milestone status based on verdict
          if (req.milestoneId) {
            Store.updateMilestone(req.milestoneId, {
              status: verdict === 'pass' ? 'review' : 'todo',
              auditStatus: verdict
            });
          }

          // Notify client and worker
          if (req.clientId) Store.addNotification({ userId: req.clientId, type: 'audit-complete', text: `Audit ${verdict === 'pass' ? 'passed' : 'failed'}: ${req.milestone}`, subtext: req.project + ' · just now', read: false });
          if (req.workerId) Store.addNotification({ userId: req.workerId, type: 'audit-complete', text: `Your milestone audit result: ${verdict === 'pass' ? 'PASS ✓' : 'FAIL ✗'}`, subtext: req.milestone + ' · just now', read: false });

          Validate.toast(`Audit report submitted. Verdict: ${verdict === 'pass' ? 'PASS' : 'FAIL'}`, verdict === 'pass' ? 'success' : 'error');
          setTimeout(() => { window.location.href = 'expert-audit-requests.html'; }, 2000);
        } catch(e) {
          Validate.toast('Error saving report: ' + e.message, 'error');
        }
      };
    });
  </script>
</head>

</html>
