<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Lannent</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <style>
    .notfound { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; background:linear-gradient(160deg,#f8f7ff 0%,#f0edff 100%); }
  </style>
</head>
<body>
  <div class="notfound">
    <div style="font-size:100px;font-weight:900;letter-spacing:-0.05em;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;line-height:1;">404</div>
    <h1 style="font-size:28px;font-weight:600;margin-bottom:12px;color:#0f172a;">Page not found</h1>
    <p style="font-size:16px;color:#64748b;max-width:400px;line-height:1.6;margin-bottom:40px;">Sorry, we couldn't find the page you're looking for. It might have been moved or doesn't exist.</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <a href="../index.html" style="padding:12px 28px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;font-weight:600;text-decoration:none;transition:transform 0.2s;" onmouseenter="this.style.transform='scale(1.04)'" onmouseleave="this.style.transform=''">Go Home</a>
      <button onclick="history.back()" style="padding:12px 28px;border-radius:12px;border:1.5px solid rgba(99,102,241,0.3);background:rgba(255,255,255,0.8);color:#4f46e5;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;">Go Back</button>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
